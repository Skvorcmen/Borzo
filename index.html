<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BORZO — Script Navigator with GitHub Issues</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #3a3a3a;
  --bg2: #474747;
  --panel: #f8f7f3;
  --white: #fff;
  --line: #ddd8cf;
  --text: #222;
  --muted: #6f6a63;
  --gold: #c9a24a;
  --gold2: #a9852f;
  --goldsoft: #f7edd6;
  --bluesoft: #edf4ff;
  --danger: #c64c4c;
  --green: #189c54;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: linear-gradient(135deg, var(--bg), var(--bg2));
  color: var(--text);
  min-height: 100vh;
}

header {
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(201, 162, 74, 0.3);
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  background: #2f2f2f;
  border: 2px solid var(--gold);
  color: var(--gold);
  padding: 6px 12px;
  border-radius: 10px;
  font-weight: 800;
  font-size: 20px;
}

.header-title {
  color: white;
  font-weight: 600;
  font-size: 14px;
}

.header-sub {
  color: rgba(255,255,255,0.7);
  font-size: 11px;
}

.menu-buttons {
  display: flex;
  gap: 10px;
  align-items: center;
}

button, .btn {
  padding: 8px 16px;
  border-radius: 40px;
  border: 1px solid var(--gold);
  background: rgba(201, 162, 74, 0.2);
  color: var(--gold);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

button:hover {
  background: rgba(201, 162, 74, 0.4);
  transform: scale(1.02);
}

.gold-btn {
  background: var(--gold);
  color: white;
  border-color: var(--gold2);
}

.gold-btn:hover {
  background: var(--gold2);
}

.danger-btn {
  color: var(--danger);
  border-color: var(--danger);
}

.layout {
  display: grid;
  grid-template-columns: 300px 1fr 320px;
  gap: 16px;
  padding: 20px;
  max-width: 1600px;
  margin: 0 auto;
}

.panel {
  background: var(--panel);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.section-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--gold2);
}

.list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.item:hover {
  border-color: var(--gold);
  background: var(--goldsoft);
}

.item.active {
  border-color: var(--gold);
  background: var(--goldsoft);
  box-shadow: 0 2px 8px rgba(201,162,74,0.2);
}

.item-title {
  font-weight: 600;
}

.card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.card-label {
  font-weight: 700;
  color: var(--gold2);
  font-size: 13px;
  text-transform: uppercase;
}

.card-text {
  white-space: pre-wrap;
  line-height: 1.5;
  color: var(--text);
}

.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.input, .textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 8px;
}

.textarea {
  min-height: 100px;
  resize: vertical;
}

.copy-btn {
  background: var(--gold);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

.empty {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  background: #fafafa;
  border-radius: 12px;
  border: 1px dashed var(--line);
}

.badge {
  background: var(--danger);
  color: white;
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: bold;
}

.proposal-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}

.proposal-card .muted {
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 8px;
}

.divider {
  height: 1px;
  background: var(--line);
  margin: 16px 0;
}

.info-box {
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 16px;
}

.gold-box {
  background: var(--goldsoft);
  border-left: 4px solid var(--gold);
}

.blue-box {
  background: var(--bluesoft);
  border-left: 4px solid #4a90e2;
}

.center-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
}

.center-sub {
  font-size: 14px;
  margin-bottom: 20px;
}

.center-sub.main {
  color: var(--green);
}

.center-sub.side {
  color: var(--muted);
}

.return-btn {
  background: var(--danger);
  color: white;
  border: none;
  width: 100%;
  padding: 12px;
  font-weight: bold;
}

.user-dropdown {
  position: relative;
}

.user-dropdown-menu {
  position: absolute;
  top: 45px;
  right: 0;
  background: var(--panel);
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  min-width: 180px;
  display: none;
  z-index: 1000;
  overflow: hidden;
}

.user-dropdown-menu.show {
  display: block;
}

.user-dropdown-item {
  padding: 12px 16px;
  cursor: pointer;
  transition: background 0.2s;
}

.user-dropdown-item:hover {
  background: var(--goldsoft);
}

.user-dropdown-item.active {
  background: var(--goldsoft);
  color: var(--gold);
  font-weight: 600;
}

.user-dropdown-divider {
  height: 1px;
  background: var(--line);
  margin: 4px 0;
}

.user-dropdown-item.logout {
  color: var(--danger);
}

.mobile-only {
  display: none;
}

@media (max-width: 768px) {
  .layout {
    display: block;
    padding: 12px;
  }
  .panel {
    margin-bottom: 12px;
  }
  .desktop-only {
    display: none !important;
  }
  .mobile-only {
    display: block !important;
  }
  .mobile-buttons-container {
    display: flex !important;
    gap: 8px;
  }
}

.app-modal-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.app-modal-backdrop.show {
  display: flex;
}

.app-modal {
  background: white;
  border-radius: 20px;
  padding: 24px;
  width: 90%;
  max-width: 450px;
}

.app-modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
}

.app-modal-text {
  color: var(--muted);
  margin-bottom: 16px;
}

.app-modal-input {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: 12px;
}

.app-modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">BORZO</div>
    <div>
      <div class="header-title">Script Navigator</div>
      <div class="header-sub">GitHub Issues Integration</div>
    </div>
  </div>
  <div class="menu-buttons">
    <div class="desktop-only" style="display: flex; gap: 8px;">
      <button id="downloadBtn" class="gold-btn" style="display: none;">📥 Скачать проект</button>
      <button id="exportBtn" class="gold-btn" style="display: none;">📄 Экспорт</button>
      <button id="logoutBtn">🚪 Выйти</button>
    </div>
    <div class="mobile-only mobile-buttons-container" style="display: none;">
      <button id="mobileMenuLeftBtn">📋 Меню</button>
      <button id="mobileMenuRightBtn">📁 Разделы</button>
      <div class="user-dropdown">
        <button id="userMenuBtn">👤</button>
        <div id="userDropdownMenu" class="user-dropdown-menu">
          <div id="roleManagerBtn" class="user-dropdown-item">👤 Менеджер</div>
          <div id="roleOwnerBtn" class="user-dropdown-item">🧑‍💼 Руководитель</div>
          <div class="user-dropdown-divider"></div>
          <div id="logoutMobileBtn" class="user-dropdown-item logout">🚪 Выйти</div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="panel">
    <div class="section-head">
      <div class="section-title">📋 Магистраль</div>
    </div>
    <div id="mainList" class="list"></div>
    <div class="divider"></div>
    <div class="section-head">
      <div class="section-title">💡 Предложения</div>
      <div id="proposalBadge"></div>
    </div>
    <div id="proposalList" class="list"></div>
  </aside>

  <main class="panel">
    <div id="centerContent"></div>
  </main>

  <aside class="panel">
    <div class="section-head">
      <div class="section-title">📂 Разделы</div>
    </div>
    <div id="sectionsList" class="list"></div>
    <div class="divider"></div>
    <button id="addSectionBtn" class="gold-btn" style="width: 100%;">+ Добавить раздел</button>
  </aside>
</div>

<div class="mobile-only" style="padding: 12px;">
  <div class="panel">
    <div id="mobileCenterContent"></div>
  </div>
</div>

<div id="mobileLeftMenu" style="display: none;"></div>
<div id="mobileRightMenu" style="display: none;"></div>

<div id="appModal" class="app-modal-backdrop">
  <div class="app-modal">
    <div id="modalTitle" class="app-modal-title"></div>
    <div id="modalText" class="app-modal-text"></div>
    <div id="modalFields"></div>
    <div id="modalActions" class="app-modal-actions"></div>
  </div>
</div>

<script>
// GitHub Configuration
const REPO_OWNER = "skvorcmen";
const REPO_NAME = "Borzo";
let githubToken = localStorage.getItem('github_token') || '';

// Storage Keys
const STORAGE_KEY = 'borzo_script_data';
const AUTH_KEY = 'borzo_auth';

// Default Data
const DEFAULT_DATA = {
  role: 'manager',
  currentBlock: 'Входящий старт',
  lastMain: 'Входящий старт',
  mainOrder: ['Входящий старт', 'Выбор модели', 'Размер и цвет', 'Город клиента', 'Доставка и оплата', 'Финальное подтверждение'],
  sectionOrder: ['Вопросы клиентов', 'Обработка возражений', 'Пауза', 'Закрытие клиента'],
  sections: {
    'Вопросы клиентов': ['Где посмотреть', 'Разница моделей', 'Нестандартный размер', 'Другой цвет'],
    'Обработка возражений': ['Дорого', 'Сомнение в прочности', 'Сомнение в качестве'],
    'Пауза': ['Подумаю / позже', 'Молчание после фильтра'],
    'Закрытие клиента': ['Дорого — закрытие', 'Не сейчас']
  },
  blocks: {
    'Входящий старт': { kind: 'main', note: 'Если клиент сразу ушёл в уточняющий вопрос, после ответа его нужно вернуть в магистраль.', hint: '', messages: [{ label: 'Стандартный входящий', text: 'Здравствуйте. Меня зовут Ульяна, менеджер BORZO.\n\nСейчас отправлю цены и краткое описание.' }] },
    'Выбор модели': { kind: 'main', note: '', hint: 'После этого сообщения отправить фото моделей.', messages: [{ label: 'Основное сообщение', text: 'Какой вариант вам ближе — LUX или GEOMETRY?' }] },
    'Размер и цвет': { kind: 'main', note: '', hint: '', messages: [{ label: 'Основное сообщение', text: 'Отлично 👍\n\nУ наших столов стандартные размеры: 3м / 3,5м / 4м\n\nПодскажите размер и цвет?' }] },
    'Город клиента': { kind: 'main', note: '', hint: '', messages: [{ label: 'Сообщение', text: 'Ваш вариант доступен.\n\nПодскажите, с какого вы города?' }] },
    'Доставка и оплата': { kind: 'main', note: '', hint: '', messages: [{ label: 'Если Астана', text: 'По Астане доставка бесплатная.\n\nПодскажите адрес и время?' }] },
    'Финальное подтверждение': { kind: 'main', note: '', hint: '', messages: [{ label: 'Подтверждение', text: 'Подтверждаю:\n\n— модель\n— размер\n— цвет\n— город\n— оплата\n\nВсё верно?' }] },
    'Где посмотреть': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Работаем в онлайн-формате от фабрики в Астане.\n\nЕсть видеообзоры — отправить?' }] },
    'Разница моделей': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'LUX — классическая модель.\nGEOMETRY — сложная геометрия и подсветка.' }] },
    'Нестандартный размер': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Мы работаем с фиксированными размерами. Индивидуальные не изготавливаем.' }] },
    'Другой цвет': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Работаем с утверждённой палитрой. Другие оттенки не производим.' }] },
    'Дорого': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Понимаю. Цена выше среднего, потому что конструкция и подход отличаются.' }] },
    'Сомнение в прочности': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Конструкция тестировалась на нагрузку 200+ кг.' }] },
    'Сомнение в качестве': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Если что-то не устроит — можно оформить возврат.' }] },
    'Подумаю / позже': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Поняла вас. Если вопросы — уточняйте.' }] },
    'Молчание после фильтра': { kind: 'side', note: '', hint: '', messages: [{ label: 'Ответ', text: 'Подскажите, ваш запрос по столу ещё актуален?' }] },
    'Дорого — закрытие': { kind: 'side', note: '', hint: '', messages: [{ label: 'Закрытие', text: 'Если вернётесь к вопросу позже — буду рада помочь.' }] },
    'Не сейчас': { kind: 'side', note: '', hint: '', messages: [{ label: 'Закрытие', text: 'Если позже вопрос станет актуальным — напишите.' }] }
  },
  proposals: []
};

let appData = null;
let currentEditBlock = null;
let currentEditSection = null;

// Helper Functions
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      appData = JSON.parse(saved);
    } else {
      appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e) {
    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

function checkAuth() {
  try {
    const auth = localStorage.getItem(AUTH_KEY);
    if (auth) {
      const data = JSON.parse(auth);
      if (data.role && (data.role === 'manager' || data.role === 'owner') && Date.now() - data.timestamp < 86400000) {
        appData.role = data.role;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function saveAuth(role) {
  localStorage.setItem(AUTH_KEY, JSON.stringify({ role, timestamp: Date.now() }));
  appData.role = role;
  saveData();
}

function isOwner() {
  return appData.role === 'owner';
}

function showModal(title, text, fieldsHtml, onConfirm, onCancel) {
  const modal = document.getElementById('appModal');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text || '';
  document.getElementById('modalFields').innerHTML = fieldsHtml || '';
  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';
  
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Отмена';
  cancelBtn.onclick = () => {
    modal.classList.remove('show');
    if (onCancel) onCancel();
  };
  
  const confirmBtn = document.createElement('button');
  confirmBtn.textContent = 'Подтвердить';
  confirmBtn.className = 'gold-btn';
  confirmBtn.onclick = () => {
    modal.classList.remove('show');
    if (onConfirm) onConfirm();
  };
  
  actions.appendChild(cancelBtn);
  actions.appendChild(confirmBtn);
  modal.classList.add('show');
}

function showPrompt(title, label, defaultValue, callback) {
  const html = `<input id="promptInput" class="app-modal-input" value="${escapeHtml(defaultValue || '')}" placeholder="${escapeHtml(label)}">`;
  showModal(title, '', html, () => {
    const val = document.getElementById('promptInput')?.value;
    if (callback) callback(val);
  });
}

function showAlert(title, message) {
  showModal(title, message, '', () => {});
}

// GitHub API Functions
async function githubFetch(endpoint, options = {}) {
  const headers = { 'Accept': 'application/vnd.github.v3+json' };
  if (githubToken) headers['Authorization'] = `token ${githubToken}`;
  const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${endpoint}`, { ...options, headers });
  if (!response.ok) throw new Error(`GitHub Error: ${response.status}`);
  return response.json();
}

async function createIssue(proposal) {
  if (!githubToken) throw new Error('No GitHub token');
  const title = `[PROPOSAL] ${proposal.type} - ${proposal.summary}`;
  const body = JSON.stringify(proposal, null, 2);
  const issue = await githubFetch('issues', {
    method: 'POST',
    body: JSON.stringify({ title, body, labels: ['proposal'] })
  });
  return issue.number;
}

async function closeIssue(number, comment) {
  if (!githubToken) return;
  await githubFetch(`issues/${number}`, { method: 'PATCH', body: JSON.stringify({ state: 'closed' }) });
  if (comment) {
    await githubFetch(`issues/${number}/comments`, { method: 'POST', body: JSON.stringify({ body: comment }) });
  }
}

// Proposal Functions
async function sendProposal(proposal) {
  const payload = {
    type: proposal.targetType,
    summary: proposal.condition || proposal.blockName || 'Изменение',
    target: proposal.targetName,
    details: proposal.text,
    extra: { blockName: proposal.blockName, sectionName: proposal.sectionName }
  };
  
  try {
    const issueNum = await createIssue(payload);
    proposal.issueNumber = issueNum;
    appData.proposals.unshift(proposal);
    saveData();
    render();
    showAlert('Успешно', `Предложение #${issueNum} отправлено в GitHub`);
  } catch(e) {
    showAlert('Ошибка', `Не удалось отправить: ${e.message}`);
  }
}

function addProposal(targetType, targetName, data) {
  if (isOwner()) {
    // Owner directly applies
    applyProposal({ targetType, targetName, ...data });
  } else {
    const proposal = {
      id: Date.now(),
      targetType,
      targetName,
      condition: data.condition,
      text: data.text,
      blockName: data.blockName,
      sectionName: data.sectionName,
      createdAt: new Date().toISOString()
    };
    sendProposal(proposal);
  }
}

function applyProposal(proposal) {
  if (proposal.targetType === 'block') {
    const block = appData.blocks[proposal.targetName];
    if (block) {
      block.messages.push({ label: proposal.condition, text: proposal.text, attachments: [] });
    }
  } else if (proposal.targetType === 'main-list') {
    const blockName = proposal.blockName || proposal.condition;
    if (!appData.blocks[blockName]) {
      appData.mainOrder.push(blockName);
      appData.blocks[blockName] = { kind: 'main', note: '', hint: '', messages: [{ label: proposal.condition, text: proposal.text, attachments: [] }] };
    }
  } else if (proposal.targetType === 'section') {
    const blockName = proposal.blockName || proposal.condition;
    if (!appData.blocks[blockName]) {
      appData.blocks[blockName] = { kind: 'side', note: '', hint: '', messages: [{ label: proposal.condition, text: proposal.text, attachments: [] }] };
    }
    if (!appData.sections[proposal.targetName]) appData.sections[proposal.targetName] = [];
    if (!appData.sections[proposal.targetName].includes(blockName)) {
      appData.sections[proposal.targetName].push(blockName);
    }
  } else if (proposal.targetType === 'new-section') {
    const sectionName = proposal.sectionName;
    const blockName = proposal.blockName;
    if (!appData.sections[sectionName]) {
      appData.sectionOrder.push(sectionName);
      appData.sections[sectionName] = [];
      if (blockName) {
        appData.blocks[blockName] = { kind: 'side', note: '', hint: '', messages: [{ label: proposal.condition, text: proposal.text, attachments: [] }] };
        appData.sections[sectionName].push(blockName);
      }
    }
  }
  saveData();
  render();
}

// Render Functions
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderMainList() {
  const container = document.getElementById('mainList');
  if (!container) return;
  container.innerHTML = '';
  appData.mainOrder.forEach(name => {
    const div = document.createElement('div');
    div.className = `item ${appData.currentBlock === name ? 'active' : ''}`;
    div.innerHTML = `<div class="item-title">${escapeHtml(name)}</div>`;
    div.onclick = () => {
      appData.currentBlock = name;
      if (appData.blocks[name]?.kind === 'main') appData.lastMain = name;
      saveData();
      render();
    };
    container.appendChild(div);
  });
}

function renderSections() {
  const container = document.getElementById('sectionsList');
  if (!container) return;
  container.innerHTML = '';
  appData.sectionOrder.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.style.marginBottom = '16px';
    sectionDiv.innerHTML = `<div class="section-title" style="font-size: 16px; margin-bottom: 8px;">📁 ${escapeHtml(section)}</div>`;
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'list';
    (appData.sections[section] || []).forEach(item => {
      const itemDiv = document.createElement('div');
      itemDiv.className = `item ${appData.currentBlock === item ? 'active' : ''}`;
      itemDiv.innerHTML = `<div class="item-title">${escapeHtml(item)}</div>`;
      itemDiv.onclick = () => {
        appData.currentBlock = item;
        saveData();
        render();
      };
      itemsDiv.appendChild(itemDiv);
    });
    sectionDiv.appendChild(itemsDiv);
    
    const addBtn = document.createElement('button');
    addBtn.textContent = isOwner() ? '+ Добавить элемент' : '+ Предложить элемент';
    addBtn.className = 'gold-btn';
    addBtn.style.width = '100%';
    addBtn.style.marginTop = '8px';
    addBtn.style.padding = '6px';
    addBtn.onclick = () => {
      if (isOwner()) {
        showPrompt('Новый элемент', 'Название элемента', '', (name) => {
          if (name && name.trim() && !appData.blocks[name.trim()]) {
            appData.blocks[name.trim()] = { kind: 'side', note: '', hint: '', messages: [] };
            appData.sections[section].push(name.trim());
            saveData();
            render();
          }
        });
      } else {
        showPrompt('Предложить элемент', 'Назначение / когда использовать', '', (cond) => {
          if (cond) {
            showPrompt('Текст сообщения', 'Введите текст ответа', '', (text) => {
              if (text) {
                addProposal('section', section, { condition: cond, text: text, blockName: '' });
              }
            });
          }
        });
      }
    };
    sectionDiv.appendChild(addBtn);
    container.appendChild(sectionDiv);
  });
}

function renderCenter() {
  const container = document.getElementById('centerContent');
  const mobileContainer = document.getElementById('mobileCenterContent');
  const block = appData.blocks[appData.currentBlock];
  if (!block) {
    const emptyHtml = '<div class="empty">Блок не найден</div>';
    if (container) container.innerHTML = emptyHtml;
    if (mobileContainer) mobileContainer.innerHTML = emptyHtml;
    return;
  }
  
  let html = `<div class="center-title">${escapeHtml(appData.currentBlock)}</div>`;
  html += `<div class="center-sub ${block.kind === 'main' ? 'main' : 'side'}">${block.kind === 'main' ? '● Магистраль' : '● Ветка сценария'}</div>`;
  
  if (block.kind !== 'main') {
    html += `<button class="return-btn" onclick="window.returnToMain()" style="width: 100%; margin-bottom: 16px;">⬅ Вернуться в магистраль</button>`;
  }
  
  if (block.note || isOwner()) {
    html += `<div class="info-box gold-box">`;
    if (isOwner()) {
      html += `<strong>Пояснение</strong><textarea id="noteInput" class="textarea" style="margin-top: 8px;">${escapeHtml(block.note || '')}</textarea>`;
    } else {
      html += escapeHtml(block.note || '');
    }
    html += `</div>`;
  }
  
  if (block.hint || isOwner()) {
    html += `<div class="info-box blue-box">`;
    if (isOwner()) {
      html += `<strong>Подсказка</strong><textarea id="hintInput" class="textarea" style="margin-top: 8px;">${escapeHtml(block.hint || '')}</textarea>`;
    } else {
      html += escapeHtml(block.hint || '');
    }
    html += `</div>`;
  }
  
  if (isOwner()) {
    html += `<button class="gold-btn" onclick="window.saveMeta()" style="width: 100%; margin-bottom: 16px;">💾 Сохранить пояснение</button>`;
  }
  
  (block.messages || []).forEach((msg, idx) => {
    html += `<div class="card">`;
    html += `<div class="card-head"><span class="card-label">${escapeHtml(msg.label)}</span>`;
    html += `<div><button class="copy-btn" onclick="window.copyMessage(${idx})">📋 Копировать</button>`;
    if (isOwner()) {
      html += `<button class="gold-btn" style="margin-left: 8px;" onclick="window.editMessage(${idx})">✎</button>`;
      html += `<button class="danger-btn" style="margin-left: 8px;" onclick="window.deleteMessage(${idx})">🗑</button>`;
    } else {
      html += `<button class="gold-btn" style="margin-left: 8px;" onclick="window.suggestMessageChange(${idx})">💡 Предложить</button>`;
    }
    html += `</div></div>`;
    html += `<div class="card-text">${escapeHtml(msg.text)}</div>`;
    html += `</div>`;
  });
  
  if (isOwner()) {
    html += `<div class="card"><strong>➕ Добавить сообщение</strong>`;
    html += `<input id="newMsgLabel" class="input" placeholder="Название сообщения">`;
    html += `<textarea id="newMsgText" class="textarea" placeholder="Текст сообщения"></textarea>`;
    html += `<button class="gold-btn" onclick="window.addMessage()" style="width: 100%;">Добавить</button></div>`;
  } else {
    html += `<div class="card"><strong>💡 Предложить новый вариант</strong>`;
    html += `<input id="proposalCond" class="input" placeholder="Назначение / когда использовать">`;
    html += `<textarea id="proposalText" class="textarea" placeholder="Текст ответа"></textarea>`;
    html += `<button class="gold-btn" onclick="window.submitProposal()" style="width: 100%;">Отправить предложение</button></div>`;
  }
  
  if (container) container.innerHTML = html;
  if (mobileContainer) mobileContainer.innerHTML = html;
}

function renderProposals() {
  const container = document.getElementById('proposalList');
  const badge = document.getElementById('proposalBadge');
  if (!container) return;
  
  if (appData.proposals.length === 0) {
    container.innerHTML = '<div class="empty">Нет активных предложений</div>';
    if (badge) badge.innerHTML = '';
    return;
  }
  
  if (badge) badge.innerHTML = `<span class="badge">${appData.proposals.length}</span>`;
  container.innerHTML = '';
  
  appData.proposals.forEach((prop, idx) => {
    const div = document.createElement('div');
    div.className = 'proposal-card';
    let typeText = prop.targetType === 'main-list' ? 'Магистраль' : (prop.targetType === 'section' ? `Раздел: ${prop.targetName}` : (prop.targetType === 'new-section' ? 'Новый раздел' : `Блок: ${prop.targetName}`));
    div.innerHTML = `
      <div class="muted">${escapeHtml(typeText)} ${prop.issueNumber ? `#${prop.issueNumber}` : ''}</div>
      <div><strong>${escapeHtml(prop.condition || prop.blockName || 'Изменение')}</strong></div>
      <div class="muted" style="margin-top: 4px;">${escapeHtml(prop.text?.substring(0, 100))}${prop.text?.length > 100 ? '...' : ''}</div>
    `;
    
    const actions = document.createElement('div');
    actions.className = 'toolbar';
    actions.style.marginTop = '8px';
    
    if (isOwner()) {
      const acceptBtn = document.createElement('button');
      acceptBtn.textContent = '✅ Принять';
      acceptBtn.className = 'gold-btn';
      acceptBtn.onclick = () => {
        applyProposal(prop);
        if (prop.issueNumber) closeIssue(prop.issueNumber, '✅ Принято руководителем');
        appData.proposals.splice(idx, 1);
        saveData();
        render();
      };
      
      const rejectBtn = document.createElement('button');
      rejectBtn.textContent = '❌ Отклонить';
      rejectBtn.className = 'danger-btn';
      rejectBtn.onclick = () => {
        if (prop.issueNumber) closeIssue(prop.issueNumber, '❌ Отклонено руководителем');
        appData.proposals.splice(idx, 1);
        saveData();
        render();
      };
      
      actions.appendChild(acceptBtn);
      actions.appendChild(rejectBtn);
    } else {
      const statusSpan = document.createElement('span');
      statusSpan.className = 'muted';
      statusSpan.textContent = prop.issueNumber ? '📎 Отправлено' : '⏳ Ожидает отправки';
      actions.appendChild(statusSpan);
    }
    
    div.appendChild(actions);
    container.appendChild(div);
  });
}

function render() {
  renderMainList();
  renderSections();
  renderCenter();
  renderProposals();
  
  const downloadBtn = document.getElementById('downloadBtn');
  const exportBtn = document.getElementById('exportBtn');
  if (downloadBtn && exportBtn) {
    const show = isOwner();
    downloadBtn.style.display = show ? 'inline-block' : 'none';
    exportBtn.style.display = show ? 'inline-block' : 'none';
  }
}

// Global Functions
window.returnToMain = () => {
  appData.currentBlock = appData.lastMain || appData.mainOrder[0];
  saveData();
  render();
};

window.copyMessage = (idx) => {
  const msg = appData.blocks[appData.currentBlock].messages[idx];
  if (msg) {
    navigator.clipboard.writeText(msg.text);
    showAlert('Скопировано', 'Текст сообщения скопирован в буфер обмена');
  }
};

window.saveMeta = () => {
  const note = document.getElementById('noteInput')?.value;
  const hint = document.getElementById('hintInput')?.value;
  if (note !== undefined) appData.blocks[appData.currentBlock].note = note;
  if (hint !== undefined) appData.blocks[appData.currentBlock].hint = hint;
  saveData();
  render();
  showAlert('Сохранено', 'Пояснение сохранено');
};

window.addMessage = () => {
  const label = document.getElementById('newMsgLabel')?.value;
  const text = document.getElementById('newMsgText')?.value;
  if (label && text) {
    appData.blocks[appData.currentBlock].messages.push({ label, text, attachments: [] });
    saveData();
    render();
    document.getElementById('newMsgLabel').value = '';
    document.getElementById('newMsgText').value = '';
  }
};

window.deleteMessage = (idx) => {
  if (confirm('Удалить сообщение?')) {
    appData.blocks[appData.currentBlock].messages.splice(idx, 1);
    saveData();
    render();
  }
};

window.editMessage = (idx) => {
  const msg = appData.blocks[appData.currentBlock].messages[idx];
  showPrompt('Редактировать сообщение', 'Название', msg.label, (label) => {
    if (label) {
      showPrompt('Текст сообщения', 'Введите текст', msg.text, (text) => {
        if (text) {
          appData.blocks[appData.currentBlock].messages[idx] = { ...msg, label, text };
          saveData();
          render();
        }
      });
    }
  });
};

window.suggestMessageChange = (idx) => {
  const msg = appData.blocks[appData.currentBlock].messages[idx];
  showPrompt('Предложить изменение', 'Назначение / когда использовать', msg.label, (cond) => {
    if (cond) {
      showPrompt('Новый текст сообщения', 'Введите текст', msg.text, (text) => {
        if (text) {
          addProposal('block', appData.currentBlock, { condition: cond, text: text, mode: 'replace', sourceIndex: idx });
        }
      });
    }
  });
};

window.submitProposal = () => {
  const cond = document.getElementById('proposalCond')?.value;
  const text = document.getElementById('proposalText')?.value;
  if (cond && text) {
    addProposal('block', appData.currentBlock, { condition: cond, text: text });
    document.getElementById('proposalCond').value = '';
    document.getElementById('proposalText').value = '';
  }
};

// Auth & Initialization
function initAuth() {
  if (!checkAuth()) {
    appData.role = 'manager';
    saveAuth('manager');
  }
  
  const roleManager = document.getElementById('roleManagerBtn');
  const roleOwner = document.getElementById('roleOwnerBtn');
  const logout = document.getElementById('logoutBtn');
  const logoutMobile = document.getElementById('logoutMobileBtn');
  const userMenuBtn = document.getElementById('userMenuBtn');
  const userDropdown = document.getElementById('userDropdownMenu');
  
  if (roleManager) {
    roleManager.onclick = () => {
      appData.role = 'manager';
      saveAuth('manager');
      render();
      if (userDropdown) userDropdown.classList.remove('show');
    };
  }
  
  if (roleOwner) {
    roleOwner.onclick = () => {
      const code = prompt('Введите код руководителя');
      if (code === '7004') {
        if (!githubToken) {
          const token = prompt('Введите GitHub токен для работы с Issues:\nhttps://github.com/settings/tokens', '');
          if (token) {
            githubToken = token;
            localStorage.setItem('github_token', token);
          }
        }
        appData.role = 'owner';
        saveAuth('owner');
        render();
      } else {
        alert('Неверный код');
      }
      if (userDropdown) userDropdown.classList.remove('show');
    };
  }
  
  if (logout) {
    logout.onclick = () => {
      localStorage.removeItem(AUTH_KEY);
      appData.role = 'manager';
      saveAuth('manager');
      render();
    };
  }
  
  if (logoutMobile) {
    logoutMobile.onclick = () => {
      localStorage.removeItem(AUTH_KEY);
      appData.role = 'manager';
      saveAuth('manager');
      render();
      if (userDropdown) userDropdown.classList.remove('show');
    };
  }
  
  if (userMenuBtn && userDropdown) {
    userMenuBtn.onclick = (e) => {
      e.stopPropagation();
      userDropdown.classList.toggle('show');
    };
    document.addEventListener('click', (e) => {
      if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
        userDropdown.classList.remove('show');
      }
    });
  }
  
  const addSectionBtn = document.getElementById('addSectionBtn');
  if (addSectionBtn) {
    addSectionBtn.onclick = () => {
      if (isOwner()) {
        showPrompt('Новый раздел', 'Название раздела', '', (name) => {
          if (name && name.trim() && !appData.sections[name.trim()]) {
            appData.sectionOrder.push(name.trim());
            appData.sections[name.trim()] = [];
            saveData();
            render();
          }
        });
      } else {
        showPrompt('Предложить раздел', 'Название раздела', '', (sectionName) => {
          if (sectionName) {
            showPrompt('Название первого элемента', 'Название элемента', '', (blockName) => {
              if (blockName) {
                showPrompt('Назначение / когда использовать', 'Описание', '', (cond) => {
                  if (cond) {
                    showPrompt('Текст сообщения', 'Введите текст', '', (text) => {
                      if (text) {
                        addProposal('new-section', '', { sectionName, blockName, condition: cond, text });
                      }
                    });
                  }
                });
              }
            });
          }
        });
      }
    };
  }
  
  const downloadBtn = document.getElementById('downloadBtn');
  const exportBtn = document.getElementById('exportBtn');
  if (downloadBtn) {
    downloadBtn.onclick = () => {
      const dataStr = JSON.stringify(appData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'borzo_backup.json';
      a.click();
      URL.revokeObjectURL(url);
    };
  }
  
  if (exportBtn) {
    exportBtn.onclick = () => {
      const exportText = JSON.stringify(appData, null, 2);
      const blob = new Blob([exportText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `borzo_export_${new Date().toISOString().slice(0,19)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    };
  }
  
  // Mobile menu
  const leftBtn = document.getElementById('mobileMenuLeftBtn');
  const rightBtn = document.getElementById('mobileMenuRightBtn');
  if (leftBtn) {
    leftBtn.onclick = () => {
      alert('Мобильное меню: используйте десктопную версию для полного функционала');
    };
  }
  if (rightBtn) {
    rightBtn.onclick = () => {
      alert('Мобильное меню: используйте десктопную версию для полного функционала');
    };
  }
}

// Start App
loadData();
initAuth();
render();
</script>
</body>
</html>
