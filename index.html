<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BORZO - Script Navigator с GitHub</title>
<style>
:root{
  --bg:#3a3a3a; --bg2:#474747; --panel:#f8f7f3; --white:#fff; --line:#ddd8cf;
  --text:#222; --muted:#6f6a63; --gold:#c9a24a; --gold2:#a9852f; --goldsoft:#f7edd6;
  --bluesoft:#edf4ff; --danger:#c64c4c; --green:#189c54; --blue:#4a6fa5;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
header{height:82px;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:rgba(20,20,20,.18);border-bottom:1px solid rgba(201,162,74,.35)}
.brand{display:flex;align-items:center;gap:14px}
.logo{border:2px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:8px;font-weight:800;letter-spacing:2px;font-size:28px;background:#2f2f2f}
.header-title{font-size:20px;font-weight:700;color:#fff}.header-sub{font-size:12px;color:#ddd;margin-top:4px}
.role-select{border:1px solid rgba(201,162,74,.45);background:#2f2f2f;color:#fff;border-radius:10px;padding:10px 12px}
.layout{display:grid;grid-template-columns:300px 1fr 340px;gap:16px;padding:16px;min-height:calc(100vh - 82px)}
.panel{background:var(--panel);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.15)}
.white{background:var(--white)}
.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:22px;font-weight:800}.muted{font-size:12px;color:var(--muted)}
.list{display:flex;flex-direction:column;gap:8px}
.item{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;transition:all .15s ease;cursor:pointer}
.item:hover{border-color:var(--gold);background:#fffaf1}
.item.active{border-color:var(--gold);background:#fff7e8}
.item-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.item-title{flex:1;font-weight:700}
.hidden-actions{display:flex;gap:6px;min-width:74px;justify-content:flex-end;visibility:hidden;opacity:0;}
.item:hover .hidden-actions{visibility:visible;opacity:1;}
.input,.textarea{width:100%;border:1px solid #d7d2c7;border-radius:10px;padding:10px 12px;background:#fff;font:inherit}
.textarea{min-height:120px;resize:vertical}
.small-btn,.copy-btn{border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;padding:10px 12px;font-size:13px}
.copy-btn{background:var(--gold);border-color:var(--gold2);color:#fff;font-weight:800}
.gold-btn{background:var(--gold);border-color:var(--gold2);color:#fff}
.blue-btn{background:var(--blue);border-color:#3a5a8a;color:#fff}
.danger-btn{color:var(--danger)}
.return-btn{background:var(--danger);border-color:#b54444;color:#fff;font-size:20px;font-weight:800;padding:16px 20px}
.center-title{font-size:34px;font-weight:800;margin-bottom:4px}
.center-sub{font-size:18px;font-weight:800;margin-bottom:14px}
.center-sub.main{color:var(--green)}
.center-sub.side{color:var(--muted)}
.info-box{border-radius:14px;padding:12px 14px;margin-bottom:12px;line-height:1.45}
.gold-box{background:var(--goldsoft);border:1px solid #ead39f}
.blue-box{background:var(--bluesoft);border:1px solid #c7d8ff}
.card{border:2px solid #2f3237;background:#fff;border-radius:14px;padding:14px;margin-bottom:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-label{font-size:12px;font-weight:900;color:var(--gold2);text-transform:uppercase}
.card-text{white-space:pre-wrap;line-height:1.62;font-size:18px;color:#2a2a2a}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.divider{height:1px;background:#e7e3da;margin:14px 0}
.empty{padding:14px;border:1px dashed #cfcac0;border-radius:12px;background:#fff;color:var(--muted);text-align:center}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--danger);color:#fff;font-size:12px;font-weight:700}
.proposal-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;margin-bottom:12px}
.proposal-title{font-weight:700;margin-bottom:6px}
.proposal-status{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:8px}
.status-pending{background:#ffc107;color:#000}
.status-local{background:#6c757d;color:#fff}
.app-modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:9999;}
.app-modal-backdrop.show{display:flex}
.app-modal{width:min(560px, calc(100vw - 32px)); background:#fff; border-radius:16px; padding:16px;}
.app-modal-title{font-size:20px; font-weight:800; margin-bottom:10px}
.app-modal-text{font-size:14px; color:var(--muted); margin-bottom:10px; white-space:pre-wrap}
.app-modal-input,.app-modal-textarea{width:100%; border:1px solid #d7d2c7; border-radius:10px; padding:10px 12px; font:inherit;}
.app-modal-textarea{min-height:120px}
.app-modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:12px}
.login-modal .role-buttons{display:flex;gap:12px;margin-bottom:16px}
.login-modal .role-btn{flex:1;padding:12px;font-weight:700;border-radius:12px;cursor:pointer;border:1px solid var(--line);background:#fff}
.login-modal .role-btn.active{background:var(--gold);color:#fff}
.login-modal .password-field{display:none}
.login-modal .password-field.show{display:block}
.github-warning{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px}
.github-warning button{background:#ffc107;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:bold}
@media (max-width:1150px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">BORZO</div>
    <div><div class="header-title">Script Navigator</div><div class="header-sub">Синхронизация через GitHub</div></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="saveProjectBtn" class="small-btn gold-btn" style="display: none;">💾 Сохранить изменения</button>
    <button id="syncIssuesBtn" class="small-btn blue-btn" style="display: none;">🔄 Синхронизировать</button>
    <select id="roleSelect" class="role-select"><option value="manager">Менеджер</option><option value="owner">Руководитель</option></select>
    <button id="logoutBtn" class="small-btn" style="background:#2f2f2f; border-color:#666; color:#fff;">Выйти</button>
  </div>
</header>

<div class="layout">
  <aside class="panel">
    <div class="section-head"><div class="section-title">Магистраль</div></div>
    <div id="mainList" class="list"></div>
    <div class="divider"></div>
    <div class="section-head"><div class="section-title" style="font-size:18px">📋 Предложения от менеджеров</div><div id="propBadge"></div></div>
    <div id="proposalList" class="list"></div>
  </aside>
  <main class="panel white"><div id="center"></div></main>
  <aside class="panel"><div id="right"></div></aside>
</div>

<script>
// ==================== КОНФИГУРАЦИЯ ====================
const GITHUB_CONFIG = {
  owner: 'Skvorcmen',
  repo: 'Borzo'
};

let githubToken = null;
let pendingProposals = [];      // Из GitHub Issues
let localProposals = [];        // Локальные предложения (если нет GitHub)

// ==================== ОСНОВНЫЕ ДАННЫЕ ====================
const KEY = 'borzo_v9';
const AUTH_KEY = 'borzo_auth';

const defaults = {
  role: 'manager',
  currentBlock: 'Входящий старт',
  lastMain: 'Входящий старт',
  mainOrder: ['Входящий старт', 'Выбор модели', 'Размер и цвет', 'Город клиента', 'Доставка и оплата', 'Финальное подтверждение'],
  sectionOrder: ['Вопросы клиентов', 'Обработка возражений', 'Пауза', 'Закрытие клиента'],
  sections: {
    'Вопросы клиентов': ['Где посмотреть', 'Разница моделей', 'Нестандартный размер', 'Другой цвет'],
    'Обработка возражений': ['Дорого', 'Сомнение в прочности', 'Сомнение в качестве', 'Доставка после 18:00'],
    'Пауза': ['Подумаю / позже', 'Молчание после фильтра', 'Выбрал модель и пропал', 'Пропал после ссылки на оплату'],
    'Закрытие клиента': ['Дорого — закрытие', 'Не сейчас']
  },
  blocks: {
    'Входящий старт': { kind: 'main', note: 'Если клиент сразу ушёл в уточняющий вопрос, после ответа его нужно вернуть в магистраль.', hint: '', messages: [
      { label: 'Стандартный входящий', text: 'Здравствуйте. Меня зовут Индира, менеджер BORZO.\n\nСейчас отправлю цены и краткое описание.' },
      { label: 'Если клиент сразу спросил город', text: 'Здравствуйте. Меня зовут Индира, менеджер BORZO.\n\nФабрика находится в Астане. Отправляем по всему Казахстану через Kaspi.\n\nСейчас отправлю цены и краткое описание.' },
      { label: 'Шапка + прайс', text: 'BORZO — дизайнерская консоль,\nкоторая станет украшением вашего интерьера.\n\nLUX:\n3 м — 310 000 ₸\n3,5 м — 335 000 ₸\n4 м — 360 000 ₸\n\nGEOMETRY:\n3 м — 335 000 ₸\n3,5 м — 360 000 ₸\n4 м — 385 000 ₸' }
    ]},
    'Выбор модели': { kind: 'main', note: 'После этого сообщения отправить фото моделей.', hint: '', messages: [{ label: 'Основное сообщение', text: 'Какой вариант вам ближе — LUX или GEOMETRY?' }] },
    'Размер и цвет': { kind: 'main', note: '', hint: '', messages: [{ label: 'Основное сообщение', text: 'Отлично 👍\n\nПодскажите размер и цвет?' }] },
    'Город клиента': { kind: 'main', note: 'После подтверждения модели и цвета', hint: '', messages: [
      { label: 'Если в наличии', text: 'Ваш вариант доступен.\n\nПодскажите, с какого вы города?' },
      { label: 'Если нужно подготовить', text: 'Ваш вариант готовится к текущей партии, будет готов к отгрузке.\n\nПодскажите, в какой город нужна доставка?' }
    ]},
    'Доставка и оплата': { kind: 'main', note: '', hint: '', messages: [
      { label: 'Если Астана', text: 'По Астане доставка бесплатная.\n\nПодскажите ваш адрес и в какое время будет удобно принять доставку?' },
      { label: 'Если другой город', text: 'Доставка по Казахстану через Kaspi. Стоимость 3000-5000 ₸.\n\nПодскажите точный адрес?' }
    ]},
    'Финальное подтверждение': { kind: 'main', note: '', hint: '', messages: [{ label: 'Подтверждение', text: 'Подтверждаю все данные. Всё верно?' }] }
  }
};

const esc = s => String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
const escAttr = s => esc(s).replaceAll('"', '&quot;');

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaults));
  } catch (e) {
    return JSON.parse(JSON.stringify(defaults));
  }
}

let state = load();

function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
  // Сохраняем локальные предложения отдельно
  localStorage.setItem('borzo_local_proposals', JSON.stringify(localProposals));
}

function loadLocalProposals() {
  try {
    const raw = localStorage.getItem('borzo_local_proposals');
    if (raw) localProposals = JSON.parse(raw);
  } catch(e) { localProposals = []; }
}

const isOwner = () => state.role === 'owner';

// ==================== РАБОТА С GITHUB ====================
function getGitHubToken() {
  return localStorage.getItem('github_token');
}

function saveGitHubToken(token) {
  githubToken = token;
  localStorage.setItem('github_token', token);
}

async function requestGitHubToken() {
  return new Promise(resolve => {
    const backdrop = document.getElementById('appModalBackdrop');
    document.getElementById('appModalTitle').textContent = '🔐 Настройка GitHub';
    document.getElementById('appModalText').innerHTML = 'Введите Personal Access Token для отправки предложений.<br><br><strong>Требуемые права:</strong> Issues (read/write)';
    document.getElementById('appModalFields').innerHTML = `
      <input id="githubTokenInput" class="app-modal-input" type="password" placeholder="GitHub Personal Access Token">
      <div class="toolbar" style="margin-top: 8px;">
        <button id="githubTokenHelpBtn" class="small-btn">❓ Как получить токен?</button>
      </div>
    `;
    const actions = document.getElementById('appModalActions');
    actions.innerHTML = '';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'small-btn';
    cancelBtn.textContent = 'Отмена';
    cancelBtn.onclick = () => { closeAppModal(); resolve(null); };
    const saveBtn = document.createElement('button');
    saveBtn.className = 'small-btn gold-btn';
    saveBtn.textContent = 'Сохранить';
    saveBtn.onclick = () => {
      const token = document.getElementById('githubTokenInput').value;
      closeAppModal();
      resolve(token);
    };
    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    backdrop.classList.add('show');
    document.getElementById('githubTokenHelpBtn').onclick = () => {
      window.open('https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens', '_blank');
    };
  });
}

// СОЗДАНИЕ ПРЕДЛОЖЕНИЯ
async function createGitHubIssue(proposal) {
  const token = getGitHubToken();
  if (!token) {
    // Нет токена - сохраняем локально
    const localProposal = {
      id: Date.now(),
      ...proposal,
      status: 'local',
      createdAt: new Date().toISOString(),
      fromGitHub: false
    };
    localProposals.unshift(localProposal);
    localStorage.setItem('borzo_local_proposals', JSON.stringify(localProposals));
    showAlertModal('⚠️ GitHub не настроен', 
      'Предложение сохранено ЛОКАЛЬНО.\n\nРуководитель его НЕ УВИДИТ, пока вы не настроите GitHub.\n\nНажмите "🔧 Настроить GitHub" в окне входа.\n\nПосле настройки предложение нужно будет отправить заново.');
    return null;
  }
  
  const title = `[ПРЕДЛОЖЕНИЕ] ${proposal.type === 'block' ? 'Изменить сообщение' : proposal.type === 'main-list' ? 'Новый блок' : proposal.type === 'section' ? 'Новый элемент' : 'Новый раздел'}: ${proposal.condition.substring(0, 40)}`;
  
  let body = `## 📝 Предложение от менеджера\n\n`;
  body += `**Тип:** ${proposal.type === 'block' ? 'Изменение сообщения' : proposal.type === 'main-list' ? 'Новый блок' : proposal.type === 'section' ? 'Новый элемент' : 'Новый раздел'}\n\n`;
  
  if (proposal.type === 'block') {
    body += `**Блок:** ${proposal.targetName}\n`;
    body += `\n**📌 Назначение/условие:**\n${proposal.condition}\n\n`;
    body += `**💬 Текст сообщения:**\n\`\`\`\n${proposal.text}\n\`\`\`\n`;
  } else if (proposal.type === 'main-list') {
    body += `**Название блока:** ${proposal.blockName}\n`;
    body += `**📌 Назначение:** ${proposal.condition}\n\n`;
    body += `**💬 Первый текст:**\n\`\`\`\n${proposal.text}\n\`\`\`\n`;
  } else if (proposal.type === 'section') {
    body += `**Раздел:** ${proposal.targetName}\n`;
    body += `**Название элемента:** ${proposal.blockName}\n`;
    body += `**📌 Назначение:** ${proposal.condition}\n\n`;
    body += `**💬 Текст:**\n\`\`\`\n${proposal.text}\n\`\`\`\n`;
  } else if (proposal.type === 'new-section') {
    body += `**Название раздела:** ${proposal.sectionName}\n`;
    body += `**Первый элемент:** ${proposal.blockName}\n`;
    body += `**📌 Назначение:** ${proposal.condition}\n\n`;
    body += `**💬 Текст:**\n\`\`\`\n${proposal.text}\n\`\`\`\n`;
  }
  
  body += `\n---\n*Создано автоматически из BORZO Navigator*`;
  
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        title: title,
        body: body,
        labels: ['pending']
      })
    });
    
    if (response.ok) {
      const issue = await response.json();
      showAlertModal('✅ Предложение отправлено', `Предложение успешно создано в GitHub!\n\nНомер: #${issue.number}\n\nРуководитель увидит его после синхронизации.`);
      return issue;
    } else {
      const error = await response.json();
      showAlertModal('❌ Ошибка', `Не удалось создать предложение: ${error.message || 'Неизвестная ошибка'}`);
      return null;
    }
  } catch (e) {
    showAlertModal('❌ Ошибка', `Ошибка соединения: ${e.message}`);
    return null;
  }
}

// ПОЛУЧЕНИЕ PENDING ISSUES
async function fetchPendingIssues() {
  const token = getGitHubToken();
  if (!token) return [];
  
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues?labels=pending&state=open&per_page=100`, {
      headers: { 'Authorization': `token ${token}` }
    });
    
    if (response.ok) {
      const issues = await response.json();
      return issues;
    }
  } catch (e) {
    console.error('Error fetching issues:', e);
  }
  return [];
}

function parseIssueToProposal(issue) {
  const body = issue.body || '';
  let type = 'block';
  let condition = issue.title.replace(/^\[ПРЕДЛОЖЕНИЕ\]\s*/, '').substring(0, 80);
  let text = '';
  let targetName = '';
  let blockName = '';
  let sectionName = '';
  
  const typeMatch = body.match(/\*\*Тип:\*\*\s*(.+)/);
  if (typeMatch) {
    const typeStr = typeMatch[1];
    if (typeStr.includes('Новый блок')) type = 'main-list';
    else if (typeStr.includes('Новый элемент')) type = 'section';
    else if (typeStr.includes('Новый раздел')) type = 'new-section';
    else type = 'block';
  }
  
  const blockMatch = body.match(/\*\*Блок:\*\*\s*(.+)/);
  if (blockMatch) targetName = blockMatch[1].trim();
  
  const blockNameMatch = body.match(/\*\*Название блока:\*\*\s*(.+)/);
  if (blockNameMatch) blockName = blockNameMatch[1].trim();
  
  const sectionMatch = body.match(/\*\*Название раздела:\*\*\s*(.+)/);
  if (sectionMatch) sectionName = sectionMatch[1].trim();
  
  const conditionMatch = body.match(/\*\*📌 Назначение.*?:\*\*\s*([^\n]+)/);
  if (!conditionMatch) {
    const condMatch2 = body.match(/\*\*Назначение\/условие:\*\*\s*([^\n]+)/);
    if (condMatch2) condition = condMatch2[1].trim();
  } else {
    condition = conditionMatch[1].trim();
  }
  
  const textMatch = body.match(/```\n([\s\S]*?)```/);
  if (textMatch) text = textMatch[1].trim();
  
  return {
    id: issue.number,
    githubIssueId: issue.number,
    githubIssueUrl: issue.html_url,
    type: type,
    targetName: targetName,
    blockName: blockName,
    sectionName: sectionName,
    condition: condition,
    text: text,
    status: 'pending',
    createdAt: issue.created_at,
    fromGitHub: true
  };
}

async function updateIssueStatus(issueNumber, status, comment = '') {
  const token = getGitHubToken();
  if (!token) return false;
  
  try {
    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueNumber}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ state: 'closed' })
    });
    
    if (comment) {
      await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueNumber}/comments`, {
        method: 'POST',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: `**Статус:** ${status === 'approved' ? '✅ ПРИНЯТО' : '❌ ОТКЛОНЕНО'}\n\n${comment}` })
      });
    }
    return true;
  } catch (e) {
    return false;
  }
}

// СИНХРОНИЗАЦИЯ
async function syncProposals() {
  if (isOwner()) {
    const token = getGitHubToken();
    if (!token) {
      const newToken = await requestGitHubToken();
      if (newToken) saveGitHubToken(newToken);
    }
    const issues = await fetchPendingIssues();
    pendingProposals = issues.map(parseIssueToProposal);
  } else {
    // Менеджер видит только свои локальные предложения
    loadLocalProposals();
    pendingProposals = localProposals.filter(p => p.status === 'local');
  }
  renderProposals();
  return pendingProposals;
}

// ПРИНЯТИЕ (только для руководителя)
async function approveProposal(proposal, withEdit) {
  if (!isOwner()) return;
  
  let p = { ...proposal };
  
  if (withEdit) {
    let result = null;
    if (p.type === 'new-section') {
      result = await showQuadFieldModal('Скорректировать предложение', 'Название раздела', 'Название элемента', 'Назначение', 'Текст',
        p.sectionName || '', p.blockName || '', p.condition || '', p.text || '');
      if (result) {
        p.sectionName = result.f1.trim() || p.sectionName;
        p.blockName = result.f2.trim() || p.blockName;
        p.condition = result.f3.trim() || p.condition;
        p.text = result.f4.trim() || p.text;
      } else return;
    } else if (p.type === 'main-list') {
      result = await showTripleFieldModal('Скорректировать блок', 'Название блока', 'Назначение', 'Текст',
        p.blockName || '', p.condition || '', p.text || '');
      if (result) {
        p.blockName = result.f1.trim() || p.blockName;
        p.condition = result.f2.trim() || p.condition;
        p.text = result.f3.trim() || p.text;
      } else return;
    } else if (p.type === 'section') {
      result = await showTripleFieldModal('Скорректировать элемент', 'Название элемента', 'Назначение', 'Текст',
        p.blockName || '', p.condition || '', p.text || '');
      if (result) {
        p.blockName = result.f1.trim() || p.blockName;
        p.condition = result.f2.trim() || p.condition;
        p.text = result.f3.trim() || p.text;
      } else return;
    } else {
      result = await showTripleFieldModal('Скорректировать предложение', 'Назначение', 'Блок', 'Текст',
        p.condition || '', p.targetName || '', p.text || '');
      if (result) {
        p.condition = result.f1.trim() || p.condition;
        p.text = result.f3.trim() || p.text;
      } else return;
    }
  }
  
  // Применяем изменения
  if (p.type === 'block') {
    if (!state.blocks[p.targetName]) state.blocks[p.targetName] = { kind: 'side', note: '', hint: '', messages: [] };
    state.blocks[p.targetName].messages.push({ label: p.condition, text: p.text, attachments: [] });
  }
  
  if (p.type === 'main-list') {
    let blockName = p.blockName || p.condition;
    if (blockName && !state.blocks[blockName]) {
      state.mainOrder.push(blockName);
      state.blocks[blockName] = { kind: 'main', note: '', hint: '', messages: [{ label: p.condition, text: p.text }] };
    }
  }
  
  if (p.type === 'section') {
    let blockName = p.blockName || p.condition;
    if (blockName) {
      if (!state.blocks[blockName]) state.blocks[blockName] = { kind: 'side', note: '', hint: '', messages: [{ label: p.condition, text: p.text }] };
      if (!state.sections[p.targetName]) state.sections[p.targetName] = [];
      if (!state.sections[p.targetName].includes(blockName)) state.sections[p.targetName].push(blockName);
    }
  }
  
  if (p.type === 'new-section') {
    let sectionName = p.sectionName || p.condition;
    let blockName = p.blockName || '';
    if (sectionName && !state.sections[sectionName]) {
      state.sectionOrder.push(sectionName);
      state.sections[sectionName] = [];
      if (blockName) {
        state.blocks[blockName] = { kind: 'side', note: '', hint: '', messages: [{ label: p.condition, text: p.text }] };
        state.sections[sectionName].push(blockName);
      }
    }
  }
  
  if (p.fromGitHub && p.githubIssueId) {
    await updateIssueStatus(p.githubIssueId, 'approved', withEdit ? 'Принято с корректировками' : 'Принято');
  }
  
  pendingProposals = pendingProposals.filter(pr => pr.id !== p.id);
  if (!p.fromGitHub) {
    localProposals = localProposals.filter(pr => pr.id !== p.id);
    localStorage.setItem('borzo_local_proposals', JSON.stringify(localProposals));
  }
  save();
  render();
  renderProposals();
  showAlertModal('✅ Успешно', 'Предложение принято и применено.');
}

async function rejectProposal(proposal) {
  if (!isOwner()) return;
  
  const comment = await showPromptModal('Отклонение предложения', 'Укажите причину отклонения', '');
  if (comment === null) return;
  
  if (proposal.fromGitHub && proposal.githubIssueId) {
    await updateIssueStatus(proposal.githubIssueId, 'rejected', comment);
  }
  
  pendingProposals = pendingProposals.filter(p => p.id !== proposal.id);
  if (!proposal.fromGitHub) {
    localProposals = localProposals.filter(p => p.id !== proposal.id);
    localStorage.setItem('borzo_local_proposals', JSON.stringify(localProposals));
  }
  renderProposals();
  showAlertModal('❌ Отклонено', `Предложение отклонено.\nПричина: ${comment || 'Не указана'}`);
}

// ==================== СОЗДАНИЕ ПРЕДЛОЖЕНИЙ ====================
async function createProposal(type, targetName, data = {}) {
  const proposalData = { type, targetName, ...data };
  await createGitHubIssue(proposalData);
  await syncProposals();
}

async function saveNewVariantProposal() {
  const condition = document.getElementById('prop-name')?.value?.trim();
  const text = document.getElementById('prop-text')?.value?.trim();
  if (!condition || !text) {
    showAlertModal('Ошибка', 'Заполните все поля');
    return;
  }
  await createProposal('block', state.currentBlock, { condition, text, mode: 'add' });
  if (document.getElementById('prop-name')) document.getElementById('prop-name').value = '';
  if (document.getElementById('prop-text')) document.getElementById('prop-text').value = '';
}

async function saveInlineProposal(i) {
  const condition = document.getElementById('inline-name-' + i)?.value?.trim();
  const text = document.getElementById('inline-text-' + i)?.value?.trim();
  if (!condition || !text) return;
  await createProposal('block', state.currentBlock, { condition, text, mode: 'replace', sourceIndex: i });
  inlineProposalIndex = null;
  render();
}

// ==================== РЕНДЕРИНГ ====================
function renderProposals() {
  const badge = document.getElementById('propBadge');
  const count = pendingProposals.length;
  badge.innerHTML = count ? `<span class="badge">${count}</span>` : '';
  
  const el = document.getElementById('proposalList');
  if (!pendingProposals.length) {
    el.innerHTML = '<div class="empty">📭 Нет активных предложений</div>';
    return;
  }
  
  el.innerHTML = '';
  pendingProposals.forEach(p => {
    const div = document.createElement('div');
    div.className = 'proposal-card';
    
    let typeText = '';
    if (p.type === 'block') typeText = '📝 Изменение сообщения';
    else if (p.type === 'main-list') typeText = '➕ Новый блок';
    else if (p.type === 'section') typeText = '📌 Новый элемент';
    else if (p.type === 'new-section') typeText = '📁 Новый раздел';
    
    let targetInfo = '';
    if (p.type === 'block') targetInfo = `<div class="muted">📍 Блок: ${esc(p.targetName || '')}</div>`;
    if (p.type === 'section') targetInfo = `<div class="muted">📍 Раздел: ${esc(p.targetName || '')}</div>`;
    
    const statusText = p.status === 'local' ? '💾 Локально' : '⏳ Ожидает';
    const statusClass = p.status === 'local' ? 'status-local' : 'status-pending';
    
    div.innerHTML = `
      <div class="proposal-title">
        ${typeText}
        <span class="proposal-status ${statusClass}">${statusText}</span>
      </div>
      ${targetInfo}
      <div class="muted" style="margin-bottom: 4px;"><b>📌 Назначение:</b> ${esc(p.condition)}</div>
      <div class="muted" style="margin-bottom: 8px;"><b>💬 Текст:</b> ${esc(p.text.substring(0, 100))}${p.text.length > 100 ? '...' : ''}</div>
      ${p.githubIssueUrl ? `<div class="muted" style="font-size: 11px;">🔗 <a href="${p.githubIssueUrl}" target="_blank">Issue #${p.githubIssueId}</a></div>` : ''}
      <div class="muted" style="font-size: 11px;">📅 ${new Date(p.createdAt).toLocaleString()}</div>
    `;
    
    const tools = document.createElement('div');
    tools.className = 'toolbar';
    
    if (isOwner()) {
      const addBtn = document.createElement('button');
      addBtn.className = 'small-btn gold-btn';
      addBtn.textContent = '✅ Принять';
      addBtn.onclick = () => approveProposal(p, false);
      tools.appendChild(addBtn);
      
      const editBtn = document.createElement('button');
      editBtn.className = 'small-btn';
      editBtn.textContent = '✏️ С корректировкой';
      editBtn.onclick = () => approveProposal(p, true);
      tools.appendChild(editBtn);
      
      const rejectBtn = document.createElement('button');
      rejectBtn.className = 'small-btn danger-btn';
      rejectBtn.textContent = '❌ Отклонить';
      rejectBtn.onclick = () => rejectProposal(p);
      tools.appendChild(rejectBtn);
    } else if (p.status === 'local') {
      const infoBtn = document.createElement('button');
      infoBtn.className = 'small-btn';
      infoBtn.textContent = '⚠️ Не отправлено';
      infoBtn.onclick = () => showAlertModal('⚠️ Локальное предложение', 
        'Это предложение сохранено только на вашем компьютере.\n\nРуководитель его НЕ УВИДИТ!\n\nЧтобы отправить руководителю:\n1. Настройте GitHub (кнопка в окне входа)\n2. Создайте предложение заново');
      tools.appendChild(infoBtn);
    } else {
      const infoBtn = document.createElement('button');
      infoBtn.className = 'small-btn';
      infoBtn.textContent = '📖 Подробнее';
      infoBtn.onclick = () => showAlertModal('Детали предложения', `${p.condition}\n\n---\n\n${p.text}`);
      tools.appendChild(infoBtn);
    }
    
    div.appendChild(tools);
    el.appendChild(div);
  });
}

function renderMain() {
  const el = document.getElementById('mainList');
  el.innerHTML = '';
  state.mainOrder.forEach(name => {
    const active = state.currentBlock === name ? 'active' : '';
    const div = document.createElement('div');
    div.className = `item ${active}`;
    div.onclick = () => openBlock(name);
    div.innerHTML = `<div class="item-row"><div class="item-title">${esc(name)}</div></div>`;
    el.appendChild(div);
  });
  
  const btn = document.createElement('button');
  btn.className = 'small-btn gold-btn';
  btn.textContent = isOwner() ? '+ блок' : '+ предложить блок';
  btn.onclick = async () => {
    if (isOwner()) {
      const n = await showPromptModal('Новый блок', 'Название блока');
      if (n && n.trim()) {
        const name = n.trim();
        state.mainOrder.push(name);
        state.blocks[name] = { kind: 'main', note: '', hint: '', messages: [] };
        save();
        render();
      }
    } else {
      const result = await showTripleFieldModal('Предложить блок', 'Название блока', 'Назначение', 'Текст первого сообщения');
      if (result && result.f1.trim() && result.f2.trim() && result.f3.trim()) {
        await createProposal('main-list', 'Магистраль', {
          blockName: result.f1.trim(),
          condition: result.f2.trim(),
          text: result.f3.trim()
        });
      }
    }
  };
  el.appendChild(btn);
}

function renderRight() {
  const wrap = document.getElementById('right');
  wrap.innerHTML = '';
  state.sectionOrder.forEach(section => {
    const group = document.createElement('div');
    group.style.marginBottom = '16px';
    group.innerHTML = `<div class="section-title">${esc(section)}</div>`;
    const list = document.createElement('div');
    list.className = 'list';
    (state.sections[section] || []).forEach(name => {
      const div = document.createElement('div');
      div.className = 'item';
      div.onclick = () => openBlock(name);
      div.innerHTML = `<div class="item-row"><div class="item-title">${esc(name)}</div></div>`;
      list.appendChild(div);
    });
    group.appendChild(list);
    
    const btn = document.createElement('button');
    btn.className = 'small-btn gold-btn';
    btn.textContent = isOwner() ? '+ элемент' : '+ предложить элемент';
    btn.onclick = async () => {
      if (isOwner()) {
        const n = await showPromptModal('Новый элемент', 'Название элемента');
        if (n && n.trim()) {
          const name = n.trim();
          state.blocks[name] = { kind: 'side', note: '', hint: '', messages: [] };
          state.sections[section].push(name);
          save();
          render();
        }
      } else {
        const result = await showTripleFieldModal('Предложить элемент', 'Название элемента', 'Назначение', 'Текст первого сообщения');
        if (result && result.f1.trim() && result.f2.trim() && result.f3.trim()) {
          await createProposal('section', section, {
            blockName: result.f1.trim(),
            condition: result.f2.trim(),
            text: result.f3.trim()
          });
        }
      }
    };
    group.appendChild(btn);
    wrap.appendChild(group);
  });
  
  const addSec = document.createElement('button');
  addSec.className = 'small-btn gold-btn';
  addSec.textContent = isOwner() ? '+ раздел' : '+ предложить раздел';
  addSec.onclick = async () => {
    if (isOwner()) {
      const n = await showPromptModal('Новый раздел', 'Название раздела');
      if (n && n.trim()) {
        const name = n.trim();
        state.sectionOrder.push(name);
        state.sections[name] = [];
        save();
        render();
      }
    } else {
      const result = await showQuadFieldModal('Предложить раздел', 'Название раздела', 'Название первого элемента', 'Назначение', 'Текст первого сообщения');
      if (result && result.f1.trim() && result.f2.trim() && result.f3.trim() && result.f4.trim()) {
        await createProposal('new-section', 'Новый раздел', {
          sectionName: result.f1.trim(),
          blockName: result.f2.trim(),
          condition: result.f3.trim(),
          text: result.f4.trim()
        });
      }
    }
  };
  wrap.appendChild(addSec);
}

function renderCenter() {
  const block = state.blocks[state.currentBlock];
  const el = document.getElementById('center');
  if (!block) {
    el.innerHTML = '<div class="empty">Блок не найден</div>';
    return;
  }
  
  // Показываем предупреждение о GitHub если нет токена
  let githubWarning = '';
  if (!isOwner() && !getGitHubToken()) {
    githubWarning = `
      <div class="github-warning">
        ⚠️ <strong>GitHub не настроен!</strong> Ваши предложения будут сохраняться ЛОКАЛЬНО, и руководитель их НЕ УВИДИТ.<br>
        <button onclick="showGitHubSetup()">🔧 Настроить GitHub</button>
      </div>
    `;
  }
  
  let html = githubWarning;
  html += `<div class="center-title">${esc(state.currentBlock)}</div>`;
  html += `<div class="center-sub ${block.kind === 'main' ? 'main' : 'side'}">${block.kind === 'main' ? '● Магистраль' : '● Ветка сценария'}</div>`;
  
  if (block.kind !== 'main') {
    html += `<div class="toolbar"><button class="small-btn return-btn" onclick="returnToMain()">⬅ Вернуться в магистраль</button></div>`;
  }
  
  if (block.note) {
    html += `<div class="info-box gold-box">${esc(block.note)}</div>`;
  }
  
  (block.messages || []).forEach((msg, i) => {
    html += `
      <div class="card">
        <div class="card-head">
          <div class="card-label">${esc(msg.label)}</div>
        </div>
        <div class="card-text">${esc(msg.text)}</div>
        <div class="toolbar">
          <button class="small-btn copy-btn" onclick="copyMessage(${i})">📋 Скопировать</button>
          ${!isOwner() ? `<button class="small-btn" onclick="startInlineProposal(${i})">✏️ Предложить изменение</button>` : ''}
        </div>
      </div>
    `;
  });
  
  if (!isOwner()) {
    html += `
      <div class="card">
        <div style="font-weight:700;margin-bottom:10px">💡 Предложить новый вариант</div>
        <input id="prop-name" class="input" placeholder="Назначение / когда использовать">
        <textarea id="prop-text" class="textarea" placeholder="Текст ответа"></textarea>
        <div class="toolbar">
          <button class="small-btn gold-btn" onclick="saveNewVariantProposal()">📤 Отправить предложение</button>
        </div>
      </div>
    `;
  }
  
  el.innerHTML = html;
}

function showGitHubSetup() {
  showLoginModal();
  setTimeout(() => {
    const githubBtn = document.getElementById('githubSetupBtn');
    if (githubBtn) githubBtn.click();
  }, 100);
}

function openBlock(name) {
  state.currentBlock = name;
  save();
  render();
}

function returnToMain() {
  state.currentBlock = state.lastMain || state.mainOrder[0];
  save();
  render();
}

function copyMessage(i) {
  const text = state.blocks[state.currentBlock].messages[i].text;
  navigator.clipboard.writeText(text);
  showAlertModal('Скопировано', 'Текст сообщения скопирован в буфер обмена');
}

let inlineProposalIndex = null;
function startInlineProposal(i) {
  inlineProposalIndex = i;
  renderCenter();
}

// ==================== АВТОРИЗАЦИЯ ====================
function saveAuth(role) {
  localStorage.setItem(AUTH_KEY, JSON.stringify({ role, timestamp: Date.now() }));
}

function checkAuth() {
  try {
    const auth = JSON.parse(localStorage.getItem(AUTH_KEY));
    if (auth && auth.role && (auth.role === 'manager' || auth.role === 'owner')) {
      if (Date.now() - auth.timestamp < 24 * 60 * 60 * 1000) {
        state.role = auth.role;
        return true;
      }
    }
  } catch (e) {}
  return false;
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  state.role = 'manager';
  save();
  render();
  showLoginModal();
}

function showLoginModal() {
  const backdrop = document.getElementById('appModalBackdrop');
  document.getElementById('appModalTitle').textContent = '🔐 Вход в систему';
  document.getElementById('appModalText').innerHTML = 'Выберите роль и введите пароль';
  document.getElementById('appModalFields').innerHTML = `
    <div class="role-buttons">
      <button id="loginRoleManager" class="role-btn active">Менеджер</button>
      <button id="loginRoleOwner" class="role-btn">Руководитель</button>
    </div>
    <div id="loginPasswordField" class="password-field show">
      <input type="password" id="loginPassword" class="app-modal-input" placeholder="Введите пароль">
    </div>
    <div style="margin-top: 12px;">
      <button id="githubSetupBtn" class="small-btn" style="width: 100%;">🔧 Настроить GitHub (для отправки предложений)</button>
    </div>
  `;
  const actions = document.getElementById('appModalActions');
  actions.innerHTML = '';
  
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'small-btn';
  cancelBtn.textContent = 'Отмена';
  cancelBtn.onclick = () => { closeAppModal(); showLoginModal(); };
  
  const loginBtn = document.createElement('button');
  loginBtn.className = 'small-btn gold-btn';
  loginBtn.textContent = 'Войти';
  loginBtn.onclick = () => {
    const selectedRole = document.querySelector('.role-btn.active').textContent;
    const password = document.getElementById('loginPassword').value;
    if (selectedRole === 'Менеджер' && password === '4007') {
      state.role = 'manager';
      saveAuth('manager');
      closeAppModal();
      save();
      render();
      syncProposals();
    } else if (selectedRole === 'Руководитель' && password === '7004') {
      state.role = 'owner';
      saveAuth('owner');
      closeAppModal();
      save();
      render();
      syncProposals();
    } else {
      alert('Неверный пароль');
    }
  };
  
  actions.appendChild(cancelBtn);
  actions.appendChild(loginBtn);
  backdrop.classList.add('show');
  
  setTimeout(() => {
    const managerBtn = document.getElementById('loginRoleManager');
    const ownerBtn = document.getElementById('loginRoleOwner');
    const passwordField = document.getElementById('loginPasswordField');
    const githubBtn = document.getElementById('githubSetupBtn');
    
    managerBtn.onclick = () => {
      managerBtn.classList.add('active');
      ownerBtn.classList.remove('active');
      passwordField.classList.add('show');
    };
    ownerBtn.onclick = () => {
      ownerBtn.classList.add('active');
      managerBtn.classList.remove('active');
      passwordField.classList.add('show');
    };
    githubBtn.onclick = async () => {
      const token = await requestGitHubToken();
      if (token) {
        saveGitHubToken(token);
        showAlertModal('✅ Успешно', 'GitHub настроен! Теперь предложения будут отправляться руководителю.');
        await syncProposals();
        render();
      }
    };
  }, 0);
}

// ==================== СОХРАНЕНИЕ В GITHUB ====================
async function saveToGitHub() {
  const token = getGitHubToken();
  if (!token) {
    const newToken = await requestGitHubToken();
    if (!newToken) return false;
    saveGitHubToken(newToken);
  }
  
  const dataToSave = JSON.stringify(state, null, 2);
  
  try {
    let sha = null;
    try {
      const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/borzo_data.json`, {
        headers: { 'Authorization': `token ${getGitHubToken()}` }
      });
      if (getResponse.ok) {
        const data = await getResponse.json();
        sha = data.sha;
      }
    } catch (e) {}
    
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/borzo_data.json`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${getGitHubToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Сохранить изменения ${new Date().toLocaleString()}`,
        content: btoa(unescape(encodeURIComponent(dataToSave))),
        sha: sha
      })
    });
    
    if (response.ok) {
      showAlertModal('✅ Успешно', 'Изменения сохранены в GitHub');
      return true;
    }
  } catch (e) {
    showAlertModal('❌ Ошибка', `Не удалось сохранить: ${e.message}`);
  }
  return false;
}

// ==================== ГЛАВНЫЙ РЕНДЕР ====================
function render() {
  roleSelect.value = state.role;
  const isOwnerMode = isOwner();
  
  saveProjectBtn.style.display = isOwnerMode ? 'inline-block' : 'none';
  syncIssuesBtn.style.display = isOwnerMode ? 'inline-block' : 'none';
  
  renderMain();
  renderRight();
  renderCenter();
  renderProposals();
  save();
}

// ==================== ЗАПУСК ====================
window.addEventListener('load', async () => {
  loadLocalProposals();
  if (!checkAuth()) {
    showLoginModal();
  } else {
    render();
    await syncProposals();
  }
});

roleSelect.addEventListener('change', e => {
  const nextRole = e.target.value;
  if (nextRole === 'owner') {
    const code = prompt('Введите код руководителя');
    if (code === '7004') {
      state.role = 'owner';
      saveAuth('owner');
    } else {
      alert('Неверный код');
      state.role = 'manager';
      roleSelect.value = 'manager';
      saveAuth('manager');
    }
  } else {
    state.role = 'manager';
    saveAuth('manager');
  }
  save();
  render();
  syncProposals();
});

logoutBtn.addEventListener('click', logout);
saveProjectBtn.addEventListener('click', async () => {
  if (await showConfirmModal('Сохранить изменения', 'Сохранить текущую базу в GitHub?')) {
    await saveToGitHub();
  }
});
syncIssuesBtn.addEventListener('click', async () => {
  await syncProposals();
  showAlertModal('Синхронизация', `Загружено ${pendingProposals.length} предложений`);
});

window.openBlock = openBlock;
window.returnToMain = returnToMain;
window.copyMessage = copyMessage;
window.startInlineProposal = startInlineProposal;
window.saveNewVariantProposal = saveNewVariantProposal;
window.saveInlineProposal = saveInlineProposal;
window.showGitHubSetup = showGitHubSetup;
</script>
