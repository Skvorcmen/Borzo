<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BORZO - Script Navigator с синхронизацией</title>
<style>
:root{
  --bg:#3a3a3a; --bg2:#474747; --panel:#f8f7f3; --white:#fff; --line:#ddd8cf;
  --text:#222; --muted:#6f6a63; --gold:#c9a24a; --gold2:#a9852f; --goldsoft:#f7edd6;
  --bluesoft:#edf4ff; --danger:#c64c4c; --green:#189c54; --blue:#4a6fa5;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
header{height:82px;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:rgba(20,20,20,.18);border-bottom:1px solid rgba(201,162,74,.35)}
.brand{display:flex;align-items:center;gap:14px}
.logo{border:2px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:8px;font-weight:800;letter-spacing:2px;font-size:28px;background:#2f2f2f}
.header-title{font-size:20px;font-weight:700;color:#fff}.header-sub{font-size:12px;color:#ddd;margin-top:4px}
.role-select{border:1px solid rgba(201,162,74,.45);background:#2f2f2f;color:#fff;border-radius:10px;padding:10px 12px}
.layout{display:grid;grid-template-columns:300px 1fr 340px;gap:16px;padding:16px;min-height:calc(100vh - 82px)}
.panel{background:var(--panel);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.15)}
.white{background:var(--white)}
.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:22px;font-weight:800}.muted{font-size:12px;color:var(--muted)}
.list{display:flex;flex-direction:column;gap:8px}
.item{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;transition:background .15s ease,border-color .15s ease,box-shadow .15s ease}
.item:hover{border-color:var(--gold);background:#fffaf1;box-shadow:0 0 0 2px rgba(201,162,74,.08) inset}
.item.active{border-color:var(--gold);background:#fff7e8;box-shadow:0 0 0 2px rgba(201,162,74,.12) inset}
.item.drag-over{border-color:#2f3237 !important; box-shadow:0 0 0 2px rgba(47,50,55,.14) inset !important}
.card.drag-over{border-color:#2f3237 !important; box-shadow:0 0 0 2px rgba(47,50,55,.12) inset !important}
.item-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.item-title{flex:1;font-weight:700;cursor:pointer}
.hidden-actions{display:flex;gap:6px;min-width:74px;justify-content:flex-end;visibility:hidden;opacity:0;pointer-events:none;}
.item:hover .hidden-actions,.item.active .hidden-actions,.item.show .hidden-actions{visibility:visible;opacity:1;pointer-events:auto;}
.input,.textarea,.item-input{width:100%;border:1px solid #d7d2c7;border-radius:10px;padding:10px 12px;background:#fff;font:inherit}
.textarea{min-height:120px;resize:vertical}
.icon-btn,.small-btn,.copy-btn{border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font:inherit}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px}
.small-btn{padding:10px 12px;font-size:13px}
.copy-btn{min-height:48px;min-width:148px;padding:12px 20px;font-size:16px;font-weight:800;background:var(--gold);border-color:var(--gold2);color:#fff;box-shadow:0 4px 12px rgba(201,162,74,.18)}
.gold-btn{background:var(--gold);border-color:var(--gold2);color:#fff}
.blue-btn{background:var(--blue);border-color:#3a5a8a;color:#fff}
.danger-btn{color:var(--danger)}
.return-btn{background:var(--danger);border-color:#b54444;color:#fff;font-size:20px;font-weight:800;padding:16px 20px;min-width:320px}
.center-title{font-size:34px;font-weight:800;margin-bottom:4px}
.center-sub{font-size:18px;font-weight:800;margin-bottom:14px}
.center-sub.main{color:var(--green)}
.center-sub.side{color:var(--muted)}
.info-box{border-radius:14px;padding:12px 14px;margin-bottom:12px;line-height:1.45}.gold-box{background:var(--goldsoft);border:1px solid #ead39f}.blue-box{background:var(--bluesoft);border:1px solid #c7d8ff}
.card{border:2px solid #2f3237;background:#ffffff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(0,0,0,.06)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-main{display:block}
.drag-handle{width:24px;height:24px;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;background:#fff;color:#666;cursor:grab;user-select:none;flex:0 0 auto;}
.drag-handle:active{cursor:grabbing}
.card-body{flex:1;min-width:0}
.card-text{user-select:text;-webkit-user-select:text;cursor:text}
.material-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.card-label{font-size:12px;font-weight:900;color:var(--gold2);text-transform:uppercase;letter-spacing:.6px}
.card-text{white-space:pre-wrap;line-height:1.62;font-size:18px;color:#2a2a2a}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.divider{height:1px;background:#e7e3da;margin:14px 0}.empty{padding:14px;border:1px dashed #cfcac0;border-radius:12px;background:#fff;color:var(--muted)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--danger);color:#fff;font-size:12px;font-weight:700}
.proposal-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;margin-bottom:12px}
.proposal-title{font-weight:700;margin-bottom:6px}
.proposal-status{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:8px}
.status-pending{background:#ffc107;color:#000}
.status-approved{background:#28a745;color:#fff}
.status-rejected{background:#dc3545;color:#fff}
.attachments-row{display:flex;gap:10px;overflow-x:auto;padding:6px 0 2px 0;margin-top:8px}
.asset-chip{min-width:120px;max-width:140px;border:1px solid #d7d2c7;border-radius:10px;padding:6px;background:#fafafa;display:flex;flex-direction:column;gap:4px}
.asset-chip-title{font-size:12px;font-weight:700;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-chip-preview{height:60px;border:1px solid #ece7dc;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px}
.asset-chip-preview img{max-width:100%;max-height:100%;display:block;border-radius:8px}
.asset-chip-link{font-size:11px;line-height:1.3;color:#555;word-break:break-all;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.asset-editor{margin-top:10px;border-top:1px solid #e7e3da;padding-top:10px}
.asset-editor-grid{display:grid;grid-template-columns:1fr 120px 1fr;gap:8px}
.asset-file{font:inherit}
.app-modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:9999;}
.app-modal-backdrop.show{display:flex}
.app-modal{width:min(560px, calc(100vw - 32px)); background:#fff; border-radius:16px; border:1px solid var(--line); box-shadow:0 20px 40px rgba(0,0,0,.25); padding:16px;}
.app-modal-title{font-size:20px; font-weight:800; margin-bottom:10px}
.app-modal-text{font-size:14px; color:var(--muted); margin-bottom:10px}
.app-modal-input,.app-modal-textarea{width:100%; border:1px solid #d7d2c7; border-radius:10px; padding:10px 12px; background:#fff; font:inherit;}
.app-modal-textarea{min-height:120px; resize:vertical}
.app-modal-actions{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:12px}
.login-modal .app-modal-input {margin-bottom: 12px;}
.login-modal .role-buttons {display: flex; gap: 12px; margin-bottom: 16px;}
.login-modal .role-btn {flex: 1; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; border: 1px solid var(--line); background: #fff; transition: all 0.2s;}
.login-modal .role-btn.active {background: var(--gold); border-color: var(--gold2); color: #fff;}
.login-modal .password-field {display: none;}
.login-modal .password-field.show {display: block;}
@media (max-width:1150px){.layout{grid-template-columns:1fr}}
</style>
</head>

const esc = s => String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
const escAttr = s => esc(s).replaceAll('"','&quot;');
const escJs = s => String(s).replaceAll('\\','\\\\').replaceAll("'", "\\'");

// ==================== РАБОТА С GITHUB ISSUES ====================
function saveGitHubToken(token) { githubToken = token; localStorage.setItem('github_token', token); }

async function requestGitHubToken() {
  return new Promise(resolve => {
    const backdrop = document.getElementById('appModalBackdrop');
    document.getElementById('appModalTitle').textContent = 'Настройка GitHub';
    document.getElementById('appModalText').textContent = 'Введите Personal Access Token (права: repo) - нужен только руководителю';
    document.getElementById('appModalFields').innerHTML = `
      <input id="githubTokenInput" class="app-modal-input" type="password" placeholder="GitHub Personal Access Token">
      <div class="toolbar" style="margin-top: 8px;"><button id="githubTokenHelpBtn" class="small-btn">Как получить токен?</button></div>
      <div class="info-box gold-box" style="margin-top: 12px; font-size: 12px;">
        ⚠️ Токен нужен только руководителю для принятия предложений.<br>
        Менеджеры могут создавать предложения без токена.
      </div>
    `;
    const actions = document.getElementById('appModalActions');
    actions.innerHTML = '';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'small-btn';
    cancelBtn.textContent = 'Отмена';
    cancelBtn.onclick = () => { closeAppModal(); resolve(null); };
    const saveBtn = document.createElement('button');
    saveBtn.className = 'small-btn gold-btn';
    saveBtn.textContent = 'Сохранить';
    saveBtn.onclick = () => { const token = document.getElementById('githubTokenInput').value; closeAppModal(); resolve(token); };
    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    backdrop.classList.add('show');
    document.getElementById('githubTokenHelpBtn').onclick = () => { window.open('https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens', '_blank'); };
  });
}

// Создание Issue (менеджер или руководитель без токена не может создавать)
async function createGitHubIssue(proposalData) {
  if (!githubToken) {
    // Если нет токена, сохраняем локально и показываем сообщение
    showAlertModal('Внимание', 'Для создания предложения в GitHub нужен токен. Предложение сохранено локально, но руководитель его не увидит пока вы не настроите GitHub.\n\nНажмите "Настроить GitHub" в окне входа.');
    return null;
  }
  
  const title = `[ПРЕДЛОЖЕНИЕ] ${proposalData.type === 'block' ? 'Изменить сообщение' : proposalData.type === 'main-list' ? 'Новый блок' : proposalData.type === 'section' ? 'Новый элемент' : 'Новый раздел'}: ${proposalData.condition.substring(0, 40)}`;
  
  let body = `## Предложение от менеджера\n\n`;
  body += `**Тип:** ${proposalData.type === 'block' ? 'Изменение сообщения' : proposalData.type === 'main-list' ? 'Новый блок' : proposalData.type === 'section' ? 'Новый элемент' : 'Новый раздел'}\n\n`;
  
  if(proposalData.type === 'block') {
    body += `**Блок:** ${proposalData.targetName}\n`;
    if(proposalData.mode === 'replace') body += `**Режим:** Замена существующего сообщения\n`;
    body += `\n**Назначение/условие:** ${proposalData.condition}\n\n`;
    body += `**Текст сообщения:**\n\`\`\`\n${proposalData.text}\n\`\`\`\n`;
  } else if(proposalData.type === 'main-list') {
    body += `**Название блока:** ${proposalData.blockName}\n`;
    body += `**Назначение:** ${proposalData.condition}\n\n`;
    body += `**Первый текст:**\n\`\`\`\n${proposalData.text}\n\`\`\`\n`;
  } else if(proposalData.type === 'section') {
    body += `**Раздел:** ${proposalData.targetName}\n`;
    body += `**Название элемента:** ${proposalData.blockName}\n`;
    body += `**Назначение:** ${proposalData.condition}\n\n`;
    body += `**Текст:**\n\`\`\`\n${proposalData.text}\n\`\`\`\n`;
  } else if(proposalData.type === 'new-section') {
    body += `**Название раздела:** ${proposalData.sectionName}\n`;
    body += `**Первый элемент:** ${proposalData.blockName}\n`;
    body += `**Назначение:** ${proposalData.condition}\n\n`;
    body += `**Текст:**\n\`\`\`\n${proposalData.text}\n\`\`\`\n`;
  }
  
  body += `\n---\n*Создано автоматически из BORZO Navigator менеджером*`;
  
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${githubToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        title: title,
        body: body,
        labels: [GITHUB_CONFIG.labels.pending]
      })
    });
    
    if (response.ok) {
      const issue = await response.json();
      showAlertModal('✅ Предложение отправлено', `Предложение создано в GitHub как Issue #${issue.number}\n\nРуководитель увидит его после синхронизации.`);
      return issue;
    } else {
      const error = await response.json();
      showAlertModal('Ошибка', `Не удалось создать Issue: ${error.message || 'Неизвестная ошибка'}`);
      return null;
    }
  } catch(e) {
    showAlertModal('Ошибка', `Ошибка создания Issue: ${e.message}`);
    return null;
  }
}

// Обновление статуса Issue
async function updateIssueStatus(issueNumber, status, comment = '') {
  if (!githubToken) return false;
  
  const label = status === 'approved' ? GITHUB_CONFIG.labels.approved : GITHUB_CONFIG.labels.rejected;
  
  try {
    // Обновляем лейбл
    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueNumber}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ labels: [label] })
    });
    
    // Добавляем комментарий
    if (comment) {
      await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueNumber}/comments`, {
        method: 'POST',
        headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: `**Статус изменен:** ${status === 'approved' ? '✅ ПРИНЯТО' : '❌ ОТКЛОНЕНО'}\n\n${comment}` })
      });
    }
    
    return true;
  } catch(e) {
    console.error('Error updating issue:', e);
    return false;
  }
}

// Закрытие Issue
async function closeIssue(issueNumber) {
  if (!githubToken) return false;
  
  try {
    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueNumber}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ state: 'closed' })
    });
    return true;
  } catch(e) {
    return false;
  }
}

// Парсинг Issue в объект предложения
function parseIssueToProposal(issue) {
  // Пытаемся извлечь данные из тела Issue
  const body = issue.body || '';
  let type = 'block';
  let condition = issue.title.replace(/^\[ПРЕДЛОЖЕНИЕ\]\s*/, '').substring(0, 50);
  let text = '';
  let targetName = '';
  let blockName = '';
  let sectionName = '';
  
  // Парсим тело
  const typeMatch = body.match(/\*\*Тип:\*\*\s*(.+)/);
  if (typeMatch) {
    const typeStr = typeMatch[1];
    if (typeStr.includes('Новый блок')) type = 'main-list';
    else if (typeStr.includes('Новый элемент')) type = 'section';
    else if (typeStr.includes('Новый раздел')) type = 'new-section';
    else type = 'block';
  }
  
  const blockMatch = body.match(/\*\*Блок:\*\*\s*(.+)/);
  if (blockMatch) targetName = blockMatch[1].trim();
  
  const blockNameMatch = body.match(/\*\*Название блока:\*\*\s*(.+)/);
  if (blockNameMatch) blockName = blockNameMatch[1].trim();
  
  const elemMatch = body.match(/\*\*Название элемента:\*\*\s*(.+)/);
  if (elemMatch) blockName = elemMatch[1].trim();
  
  const sectionMatch = body.match(/\*\*Название раздела:\*\*\s*(.+)/);
  if (sectionMatch) sectionName = sectionMatch[1].trim();
  
  const firstElemMatch = body.match(/\*\*Первый элемент:\*\*\s*(.+)/);
  if (firstElemMatch) blockName = firstElemMatch[1].trim();
  
  const conditionMatch = body.match(/\*\*Назначение\/условие:\*\*\s*(.+?)(?:\n\n|\n\*)/s);
  if (conditionMatch) condition = conditionMatch[1].trim();
  
  const textMatch = body.match(/```\n([\s\S]*?)```/);
  if (textMatch) text = textMatch[1].trim();
  
  return {
    id: issue.number,
    githubIssueId: issue.number,
    githubIssueUrl: issue.html_url,
    targetType: type,
    targetName: targetName,
    blockName: blockName,
    sectionName: sectionName,
    condition: condition,
    text: text,
    status: issue.labels.find(l => l.name === GITHUB_CONFIG.labels.approved) ? 'approved' : 
            (issue.labels.find(l => l.name === GITHUB_CONFIG.labels.rejected) ? 'rejected' : 'pending'),
    createdAt: issue.created_at,
    fromGitHub: true
  };
}

// Синхронизация предложений из GitHub
async function syncProposalsFromGitHub() {
  if (!githubToken) {
    if (isOwner()) {
      const token = await requestGitHubToken();
      if (token) saveGitHubToken(token);
      else return [];
    } else {
      return [];
    }
  }
  
  const issues = await fetchPendingIssues();
  const proposals = issues.map(parseIssueToProposal);
  githubIssuesProposals = proposals;
  
  // Объединяем с локальными предложениями (локальные только для менеджеров без токена)
  const allProposals = [...proposals];
  
  renderProposals();
  return allProposals;
}

// ==================== ФУНКЦИИ ДЛЯ ПРЕДЛОЖЕНИЙ ====================
async function createProposalWithGitHub(proposalData) {
  // Создаем Issue в GitHub (если есть токен)
  const issue = await createGitHubIssue(proposalData);
  
  if (issue) {
    // Если Issue создан, добавляем в локальный список
    const proposal = {
      id: issue.number,
      githubIssueId: issue.number,
      githubIssueUrl: issue.html_url,
      ...proposalData,
      createdAt: new Date().toISOString(),
      status: 'pending',
      fromGitHub: true
    };
    githubIssuesProposals.unshift(proposal);
  } else if (githubToken === null && isOwner()) {
    // Если руководитель пытается создать без токена - просим ввести
    const token = await requestGitHubToken();
    if (token) {
      saveGitHubToken(token);
      return createProposalWithGitHub(proposalData);
    }
  } else if (!githubToken && !isOwner()) {
    // Менеджер без токена - показываем сообщение
    showAlertModal('⚠️ Требуется настройка GitHub', 'Для отправки предложений руководителю необходимо настроить GitHub.\n\nНажмите "🔧 Настроить GitHub" в окне входа и введите токен.\n\nЕсли у вас нет токена, обратитесь к руководителю.');
  }
  
  renderProposals();
}

// Принятие предложения (руководитель)
async function approveProposal(proposal, withEdit) {
  if (!proposal.fromGitHub) {
    // Локальное предложение (без GitHub)
    applyProposalChanges(proposal);
    // Удаляем из локального списка
    const index = githubIssuesProposals.findIndex(p => p.id === proposal.id);
    if (index !== -1) githubIssuesProposals.splice(index, 1);
    renderProposals();
    render();
    save();
    return;
  }
  
  // GitHub Issue
  let updatedProposal = { ...proposal };
  
  if (withEdit) {
    // Редактирование предложения
    let result = null;
    if (proposal.targetType === 'new-section') {
      result = await showQuadFieldModal('Скорректировать предложение', 'Название раздела', 'Название элемента', 'Назначение', 'Текст',
        proposal.sectionName || '', proposal.blockName || '', proposal.condition || '', proposal.text || '');
      if (result) {
        updatedProposal.sectionName = result.f1.trim() || proposal.sectionName;
        updatedProposal.blockName = result.f2.trim() || proposal.blockName;
        updatedProposal.condition = result.f3.trim() || proposal.condition;
        updatedProposal.text = result.f4.trim() || proposal.text;
      } else return;
    } else if (proposal.targetType === 'main-list') {
      result = await showTripleFieldModal('Скорректировать блок', 'Название блока', 'Назначение', 'Текст',
        proposal.blockName || '', proposal.condition || '', proposal.text || '');
      if (result) {
        updatedProposal.blockName = result.f1.trim() || proposal.blockName;
        updatedProposal.condition = result.f2.trim() || proposal.condition;
        updatedProposal.text = result.f3.trim() || proposal.text;
      } else return;
    } else if (proposal.targetType === 'section') {
      result = await showTripleFieldModal('Скорректировать элемент', 'Название элемента', 'Назначение', 'Текст',
        proposal.blockName || '', proposal.condition || '', proposal.text || '');
      if (result) {
        updatedProposal.blockName = result.f1.trim() || proposal.blockName;
        updatedProposal.condition = result.f2.trim() || proposal.condition;
        updatedProposal.text = result.f3.trim() || proposal.text;
      } else return;
    } else {
      result = await showTripleFieldModal('Скорректировать предложение', 'Назначение', 'Блок', 'Текст',
        proposal.condition || '', proposal.targetName || '', proposal.text || '');
      if (result) {
        updatedProposal.condition = result.f1.trim() || proposal.condition;
        updatedProposal.text = result.f3.trim() || proposal.text;
      } else return;
    }
  }
  
  // Применяем изменения
  applyProposalChanges(updatedProposal);
  
  // Обновляем статус в GitHub
  await updateIssueStatus(proposal.githubIssueId, 'approved', withEdit ? 'Принято с корректировками' : 'Принято');
  await closeIssue(proposal.githubIssueId);
  
  // Удаляем из списка
  const index = githubIssuesProposals.findIndex(p => p.id === proposal.id);
  if (index !== -1) githubIssuesProposals.splice(index, 1);
  
  renderProposals();
  render();
  save();
  showAlertModal('✅ Успешно', 'Предложение принято и применено.');
}

// Применение изменений из предложения
function applyProposalChanges(proposal) {
  if (proposal.targetType === 'block') {
    if (!state.blocks[proposal.targetName]) state.blocks[proposal.targetName] = {kind:'side',note:'',hint:'',messages:[]};
    if (proposal.mode === 'replace' && Number.isInteger(proposal.sourceIndex) && state.blocks[proposal.targetName].messages[proposal.sourceIndex]) {
      const existing = state.blocks[proposal.targetName].messages[proposal.sourceIndex] || {};
      state.blocks[proposal.targetName].messages[proposal.sourceIndex] = {label:proposal.condition, text:proposal.text, attachments: existing.attachments || []};
    } else {
      state.blocks[proposal.targetName].messages.push({label:proposal.condition, text:proposal.text, attachments:[]});
    }
  }
  
  if (proposal.targetType === 'main-list') {
    let blockName = proposal.blockName || proposal.condition;
    if (blockName && !state.blocks[blockName]) {
      state.mainOrder.push(blockName);
      state.blocks[blockName] = {kind:'main',note:'',hint:'',messages:[{label:proposal.condition, text:proposal.text}]};
    }
  }
  
  if (proposal.targetType === 'section') {
    let blockName = proposal.blockName || proposal.condition;
    if (blockName) {
      if (!state.blocks[blockName]) state.blocks[blockName] = {kind:'side',note:'',hint:'',messages:[{label:proposal.condition, text:proposal.text}]};
      if (!state.sections[proposal.targetName]) state.sections[proposal.targetName] = [];
      if (!state.sections[proposal.targetName].includes(blockName)) state.sections[proposal.targetName].push(blockName);
    }
  }
  
  if (proposal.targetType === 'new-section') {
    let sectionName = proposal.sectionName || proposal.condition;
    let blockName = proposal.blockName || '';
    if (sectionName && !state.sections[sectionName]) {
      state.sectionOrder.push(sectionName);
      state.sections[sectionName] = [];
      if (blockName) {
        state.blocks[blockName] = {kind:'side',note:'',hint:'',messages:[{label:proposal.condition, text:proposal.text}]};
        state.sections[sectionName].push(blockName);
      }
    }
  }
}

// Отклонение предложения
async function rejectProposal(proposal) {
  const comment = await showPromptModal('Отклонение предложения', 'Укажите причину отклонения', '');
  if (comment === null) return;
  
  if (proposal.fromGitHub && proposal.githubIssueId) {
    await updateIssueStatus(proposal.githubIssueId, 'rejected', comment);
    await closeIssue(proposal.githubIssueId);
  }
  
  const index = githubIssuesProposals.findIndex(p => p.id === proposal.id);
  if (index !== -1) githubIssuesProposals.splice(index, 1);
  
  renderProposals();
  showAlertModal('Отклонено', `Предложение отклонено. Причина: ${comment || 'Не указана'}`);
}

// ==================== ФУНКЦИИ РЕНДЕРИНГА ПРЕДЛОЖЕНИЙ ====================
function renderProposals() {
  const badge = document.getElementById('propBadge');
  const count = githubIssuesProposals.filter(p => p.status === 'pending').length;
  badge.innerHTML = count ? `<span class='badge'>${count}</span>` : '';
  
  const el = document.getElementById('proposalList');
  if (!githubIssuesProposals.length) {
    el.innerHTML = "<div class='empty'>📭 Нет активных предложений</div>";
    return;
  }
  
  el.innerHTML = '';
  githubIssuesProposals.forEach((p, i) => {
    const isPending = p.status === 'pending';
    const div = document.createElement('div');
    div.className = 'proposal-card';
    
    let typeText = '';
    if (p.targetType === 'block') typeText = '📝 Изменение сообщения';
    else if (p.targetType === 'main-list') typeText = '➕ Новый блок';
    else if (p.targetType === 'section') typeText = '📌 Новый элемент';
    else if (p.targetType === 'new-section') typeText = '📁 Новый раздел';
    
    let targetInfo = '';
    if (p.targetType === 'block') targetInfo = `<div class='muted'>Блок: ${esc(p.targetName || '')}</div>`;
    if (p.targetType === 'section') targetInfo = `<div class='muted'>Раздел: ${esc(p.targetName || '')}</div>`;
    
    let statusClass = '';
    let statusText = '';
    if (p.status === 'pending') { statusClass = 'status-pending'; statusText = '⏳ Ожидает'; }
    else if (p.status === 'approved') { statusClass = 'status-approved'; statusText = '✅ Принято'; }
    else if (p.status === 'rejected') { statusClass = 'status-rejected'; statusText = '❌ Отклонено'; }
    
    div.innerHTML = `
      <div class="proposal-title">
        ${typeText}
        <span class="proposal-status ${statusClass}">${statusText}</span>
      </div>
      ${targetInfo}
      <div class="muted" style="margin-bottom: 4px;"><b>📌 Назначение:</b> ${esc(p.condition)}</div>
      <div class="muted" style="margin-bottom: 8px;"><b>💬 Текст:</b> ${esc(p.text.substring(0, 100))}${p.text.length > 100 ? '...' : ''}</div>
      ${p.githubIssueUrl ? `<div class="muted" style="font-size: 11px;">🔗 <a href="${p.githubIssueUrl}" target="_blank">Issue #${p.githubIssueId}</a></div>` : ''}
      <div class="muted" style="font-size: 11px;">📅 ${new Date(p.createdAt).toLocaleString()}</div>
    `;
    
    const tools = document.createElement('div');
    tools.className = 'toolbar';
    
    if (isOwner() && isPending) {
      const addBtn = document.createElement('button');
      addBtn.className = 'small-btn gold-btn';
      addBtn.textContent = '✅ Принять';
      addBtn.onclick = () => approveProposal(p, false);
      tools.appendChild(addBtn);
      
      const editBtn = document.createElement('button');
      editBtn.className = 'small-btn';
      editBtn.textContent = '✏️ С корректировкой';
      editBtn.onclick = () => approveProposal(p, true);
      tools.appendChild(editBtn);
      
      const rejectBtn = document.createElement('button');
      rejectBtn.className = 'small-btn danger-btn';
      rejectBtn.textContent = '❌ Отклонить';
      rejectBtn.onclick = () => rejectProposal(p);
      tools.appendChild(rejectBtn);
    } else if (!isOwner() && isPending) {
      const infoBtn = document.createElement('button');
      infoBtn.className = 'small-btn';
      infoBtn.textContent = '📖 Подробнее';
      infoBtn.onclick = () => showAlertModal('Детали предложения', `${p.condition}\n\n---\n\n${p.text}`);
      tools.appendChild(infoBtn);
    }
    
    div.appendChild(tools);
    el.appendChild(div);
  });
}

// ==================== ФУНКЦИИ ДЛЯ СОЗДАНИЯ ПРЕДЛОЖЕНИЙ ====================
async function createProposal(targetType, targetName) {
  if (targetType === 'main-list') {
    const result = await showTripleFieldModal('Предложить блок', 'Название блока', 'Назначение / когда использовать', 'Текст первого сообщения');
    if (!result || !result.f1.trim() || !result.f2.trim() || !result.f3.trim()) return;
    createProposalWithGitHub({
      type: 'main-list',
      targetName: targetName,
      blockName: result.f1.trim(),
      condition: result.f2.trim(),
      text: result.f3.trim()
    });
    return;
  }
  
  if (targetType === 'section') {
    const result = await showTripleFieldModal('Предложить элемент', 'Название элемента', 'Назначение / когда использовать', 'Текст первого сообщения');
    if (!result || !result.f1.trim() || !result.f2.trim() || !result.f3.trim()) return;
    createProposalWithGitHub({
      type: 'section',
      targetName: targetName,
      blockName: result.f1.trim(),
      condition: result.f2.trim(),
      text: result.f3.trim()
    });
    return;
  }
  
  if (targetType === 'new-section') {
    const result = await showQuadFieldModal('Предложить раздел', 'Название раздела', 'Название первого элемента', 'Назначение / когда использовать', 'Текст первого сообщения');
    if (!result || !result.f1.trim() || !result.f2.trim() || !result.f3.trim() || !result.f4.trim()) return;
    createProposalWithGitHub({
      type: 'new-section',
      targetName: targetName,
      sectionName: result.f1.trim(),
      blockName: result.f2.trim(),
      condition: result.f3.trim(),
      text: result.f4.trim()
    });
    return;
  }
  
  const result = await showTripleFieldModal('Предложить изменение', 'Назначение / когда использовать', 'Текущий блок', 'Текст ответа', '', targetName || '', '');
  if (!result || !result.f1.trim() || !result.f3.trim()) return;
  createProposalWithGitHub({
    type: 'block',
    targetName: targetName,
    condition: result.f1.trim(),
    text: result.f3.trim(),
    mode: 'add'
  });
}

function saveNewVariantProposal() {
  const condition = (document.getElementById('prop-name')?.value || '').trim();
  const text = (document.getElementById('prop-text')?.value || '').trim();
  if (!condition || !text) return;
  createProposalWithGitHub({
    type: 'block',
    targetName: state.currentBlock,
    condition: condition,
    text: text,
    mode: 'add'
  });
  if (document.getElementById('prop-name')) document.getElementById('prop-name').value = '';
  if (document.getElementById('prop-text')) document.getElementById('prop-text').value = '';
}

function saveInlineProposal(i) {
  const condition = (document.getElementById('inline-name-'+i)?.value || '').trim();
  const text = (document.getElementById('inline-text-'+i)?.value || '').trim();
  if (!condition || !text) return;
  createProposalWithGitHub({
    type: 'block',
    targetName: state.currentBlock,
    condition: condition,
    text: text,
    mode: 'replace',
    sourceIndex: i
  });
  inlineProposalIndex = null;
  render();
}

// ==================== АВТОРИЗАЦИЯ ====================
function saveAuth(role) { localStorage.setItem(AUTH_KEY, JSON.stringify({ role, timestamp: Date.now() })); }
function checkAuth() { try { const auth = JSON.parse(localStorage.getItem(AUTH_KEY)); if (auth && auth.role && (auth.role === 'manager' || auth.role === 'owner')) { if (Date.now() - auth.timestamp < 24 * 60 * 60 * 1000) { state.role = auth.role; return true; } } } catch(e) {} return false; }
function logout() { localStorage.removeItem(AUTH_KEY); state.role = 'manager'; save(); render(); showLoginModal(); }

function showLoginModal() {
  const backdrop = document.getElementById('appModalBackdrop');
  const modalTitle = document.getElementById('appModalTitle');
  const modalText = document.getElementById('appModalText');
  const modalFields = document.getElementById('appModalFields');
  const modalActions = document.getElementById('appModalActions');
  backdrop.className = 'app-modal-backdrop login-modal show';
  modalTitle.textContent = 'Вход в систему';
  modalText.textContent = 'Выберите роль и введите пароль';
  modalFields.innerHTML = `
    <div class="role-buttons">
      <button id="loginRoleManager" class="role-btn active">Менеджер</button>
      <button id="loginRoleOwner" class="role-btn">Руководитель</button>
    </div>
    <div id="loginPasswordField" class="password-field show">
      <input type="password" id="loginPassword" class="app-modal-input" placeholder="Введите пароль">
    </div>
    <div style="margin-top: 12px;">
      <button id="githubSetupBtn" class="small-btn" style="width: 100%;">🔧 Настроить GitHub (только для руководителя)</button>
    </div>
  `;
  modalActions.innerHTML = '';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'small-btn';
  cancelBtn.textContent = 'Отмена';
  cancelBtn.onclick = () => { closeAppModal(); showLoginModal(); };
  const loginBtn = document.createElement('button');
  loginBtn.className = 'small-btn gold-btn';
  loginBtn.textContent = 'Войти';
  loginBtn.onclick = () => {
    const selectedRole = document.querySelector('.role-btn.active').textContent;
    const password = document.getElementById('loginPassword').value;
    if (selectedRole === 'Менеджер') {
      if (password === '4007') {
        state.role = 'manager';
        saveAuth('manager');
        closeAppModal();
        save();
        render();
        syncProposalsFromGitHub();
      } else { alert('Неверный пароль для менеджера'); }
    } else if (selectedRole === 'Руководитель') {
      if (password === '7004') {
        state.role = 'owner';
        saveAuth('owner');
        closeAppModal();
        save();
        render();
        syncProposalsFromGitHub();
      } else { alert('Неверный пароль для руководителя'); }
    }
  };
  modalActions.appendChild(cancelBtn);
  modalActions.appendChild(loginBtn);
  backdrop.classList.add('show');
  
  setTimeout(() => {
    const managerBtn = document.getElementById('loginRoleManager');
    const ownerBtn = document.getElementById('loginRoleOwner');
    const passwordField = document.getElementById('loginPasswordField');
    const githubSetupBtn = document.getElementById('githubSetupBtn');
    managerBtn.onclick = () => { managerBtn.classList.add('active'); ownerBtn.classList.remove('active'); passwordField.classList.add('show'); };
    ownerBtn.onclick = () => { ownerBtn.classList.add('active'); managerBtn.classList.remove('active'); passwordField.classList.add('show'); };
    githubSetupBtn.onclick = async () => {
      const token = await requestGitHubToken();
      if (token) { saveGitHubToken(token); showAlertModal('Успешно', 'GitHub настроен. Теперь предложения будут синхронизироваться.'); await syncProposalsFromGitHub(); render(); }
    };
  }, 0);
}

// ==================== ГЛАВНЫЙ РЕНДЕР ====================
function render() {
  roleSelect.value = state.role || 'manager';
  const isOwnerMode = isOwner();
  downloadProjectBtn.style.display = isOwnerMode ? 'inline-block' : 'none';
  exportBtn.style.display = isOwnerMode ? 'inline-block' : 'none';
  saveProjectBtn.style.display = isOwnerMode ? 'inline-block' : 'none';
  syncIssuesBtn.style.display = isOwnerMode ? 'inline-block' : 'none';
  
  // Простой рендеринг для остальных частей
  const mainEl = document.getElementById('mainList');
  if (mainEl) mainEl.innerHTML = '<div class="empty">Загрузка...</div>';
  const rightEl = document.getElementById('right');
  if (rightEl) rightEl.innerHTML = '<div class="empty">Загрузка...</div>';
  const centerEl = document.getElementById('center');
  if (centerEl && state.blocks[state.currentBlock]) {
    centerEl.innerHTML = `<div class="center-title">${esc(state.currentBlock)}</div><div class="card-text">Загрузка сообщений...</div>`;
  }
  
  // Полный рендеринг
  if (typeof renderFull === 'undefined') {
    // Быстрый рендеринг для отображения
    document.getElementById('mainList').innerHTML = (state.mainOrder || []).map(name => `<div class="item ${state.currentBlock === name ? 'active' : ''}" onclick="openBlock('${escJs(name)}')"><div class="item-row"><div class="item-title">${esc(name)}</div></div></div>`).join('');
    document.getElementById('right').innerHTML = (state.sectionOrder || []).map(section => `<div><div class="section-title">${esc(section)}</div><div class="list">${(state.sections[section] || []).map(name => `<div class="item" onclick="openBlock('${escJs(name)}')">${esc(name)}</div>`).join('')}</div></div>`).join('');
    if (centerEl && state.blocks[state.currentBlock]) {
      const block = state.blocks[state.currentBlock];
      centerEl.innerHTML = `<div class="center-title">${esc(state.currentBlock)}</div>${(block.messages || []).map(msg => `<div class="card"><div class="card-label">${esc(msg.label)}</div><div class="card-text">${esc(msg.text)}</div><button class="small-btn copy-btn" onclick="copyMessage(${msg.index})">Скопировать</button></div>`).join('')}`;
    }
  }
  save();
}

// ==================== ЗАПУСК ====================
window.addEventListener('load', async () => {
  if (!checkAuth()) {
    showLoginModal();
  } else {
    await syncProposalsFromGitHub();
    render();
  }
});

logoutBtn.addEventListener('click', logout);
roleSelect.addEventListener('change', e => {
  const nextRole = e.target.value;
  if (nextRole === 'owner') {
    const code = prompt('Введите код руководителя');
    if (code !== '7004') {
      alert('Неверный код');
      state.role = 'manager';
      roleSelect.value = 'manager';
      saveAuth('manager');
      save();
      render();
      return;
    }
    state.role = 'owner';
    saveAuth('owner');
  } else {
    state.role = 'manager';
    saveAuth('manager');
  }
  save();
  render();
  syncProposalsFromGitHub();
});
