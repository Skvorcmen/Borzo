<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BORZO - Script Navigator</title>
<style>
:root{
  --bg:#3a3a3a; --bg2:#474747; --panel:#f8f7f3; --white:#fff; --line:#ddd8cf;
  --text:#222; --muted:#6f6a63; --gold:#c9a24a; --gold2:#a9852f; --goldsoft:#f7edd6;
  --bluesoft:#edf4ff; --danger:#c64c4c; --green:#189c54; --blue:#4a6fa5;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
header{height:82px;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:rgba(20,20,20,.18);border-bottom:1px solid rgba(201,162,74,.35)}
.brand{display:flex;align-items:center;gap:14px}
.logo{border:2px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:8px;font-weight:800;letter-spacing:2px;font-size:28px;background:#2f2f2f}
.header-title{font-size:20px;font-weight:700;color:#fff}.header-sub{font-size:12px;color:#ddd;margin-top:4px}
.role-select{border:1px solid rgba(201,162,74,.45);background:#2f2f2f;color:#fff;border-radius:10px;padding:10px 12px}
.layout{display:grid;grid-template-columns:300px 1fr 340px;gap:16px;padding:16px;min-height:calc(100vh - 82px)}
.panel{background:var(--panel);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.15)}
.white{background:var(--white)}
.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:22px;font-weight:800}.muted{font-size:12px;color:var(--muted)}
.list{display:flex;flex-direction:column;gap:8px}
.item{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;transition:background .15s ease,border-color .15s ease,box-shadow .15s ease}
.item:hover{border-color:var(--gold);background:#fffaf1;box-shadow:0 0 0 2px rgba(201,162,74,.08) inset}
.item.active{border-color:var(--gold);background:#fff7e8;box-shadow:0 0 0 2px rgba(201,162,74,.12) inset}
.item.drag-over{border-color:#2f3237 !important; box-shadow:0 0 0 2px rgba(47,50,55,.14) inset !important}
.card.drag-over{border-color:#2f3237 !important; box-shadow:0 0 0 2px rgba(47,50,55,.12) inset !important}
.item-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.item-title{flex:1;font-weight:700;cursor:pointer}
.hidden-actions{display:flex;gap:6px;min-width:74px;justify-content:flex-end;visibility:hidden;opacity:0;pointer-events:none;}
.item:hover .hidden-actions,.item.active .hidden-actions,.item.show .hidden-actions{visibility:visible;opacity:1;pointer-events:auto;}
.input,.textarea,.item-input{width:100%;border:1px solid #d7d2c7;border-radius:10px;padding:10px 12px;background:#fff;font:inherit}
.textarea{min-height:120px;resize:vertical}
.icon-btn,.small-btn,.copy-btn{border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font:inherit}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px}
.small-btn{padding:10px 12px;font-size:13px}
.copy-btn{min-height:48px;min-width:148px;padding:12px 20px;font-size:16px;font-weight:800;background:var(--gold);border-color:var(--gold2);color:#fff;box-shadow:0 4px 12px rgba(201,162,74,.18)}
.gold-btn{background:var(--gold);border-color:var(--gold2);color:#fff}
.blue-btn{background:var(--blue);border-color:#3a5a8a;color:#fff}
.danger-btn{color:var(--danger)}
.return-btn{background:var(--danger);border-color:#b54444;color:#fff;font-size:20px;font-weight:800;padding:16px 20px;min-width:320px}
.center-title{font-size:34px;font-weight:800;margin-bottom:4px}
.center-sub{font-size:18px;font-weight:800;margin-bottom:14px}
.center-sub.main{color:var(--green)}
.center-sub.side{color:var(--muted)}
.info-box{border-radius:14px;padding:12px 14px;margin-bottom:12px;line-height:1.45}.gold-box{background:var(--goldsoft);border:1px solid #ead39f}.blue-box{background:var(--bluesoft);border:1px solid #c7d8ff}
.card{border:2px solid #2f3237;background:#ffffff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(0,0,0,.06)}

.card-main{display:block}

.card-body{flex:1;min-width:0}
.card-text{user-select:text;-webkit-user-select:text;cursor:text}
.material-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.card-label{font-size:12px;font-weight:900;color:var(--gold2);text-transform:uppercase;letter-spacing:.6px}
.card-text{white-space:pre-wrap;line-height:1.62;font-size:18px;color:#2a2a2a}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--danger);color:#fff;font-size:12px;font-weight:700}
.proposal-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
.proposal-title{font-weight:700;margin-bottom:6px}

.asset-chip-preview img{max-width:100%;max-height:100%;display:block;border-radius:8px}

.asset-editor{margin-top:10px;border-top:1px solid #e7e3da;padding-top:10px}
.asset-editor-grid{display:grid;grid-template-columns:1fr 120px 1fr;gap:8px}
.asset-file{font:inherit}
.app-modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:9999;}
.app-modal-backdrop.show{display:flex}
.app-modal{width:min(560px, calc(100vw - 32px)); background:#fff; border-radius:16px; border:1px solid var(--line); box-shadow:0 20px 40px rgba(0,0,0,.25); padding:16px;}
.app-modal-title{font-size:20px; font-weight:800; margin-bottom:10px}
.app-modal-text{font-size:14px; color:var(--muted); margin-bottom:10px}
.app-modal-input,.app-modal-textarea{width:100%; border:1px solid #d7d2c7; border-radius:10px; padding:10px 12px; background:#fff; font:inherit;}
.app-modal-textarea{min-height:120px; resize:vertical}
.app-modal-actions{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:12px}
.login-modal .app-modal-input {margin-bottom: 12px;}
.login-modal .role-buttons {display: flex; gap: 12px; margin-bottom: 16px;}
.login-modal .role-btn {flex: 1; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; border: 1px solid var(--line); background: #fff; transition: all 0.2s;}
.login-modal .role-btn.active {background: var(--gold); border-color: var(--gold2); color: #fff;}
.login-modal .password-field {display: none;}
.login-modal .password-field.show {display: block;}
@media (max-width:1150px){.layout{grid-template-columns:1fr}}
</style>
</head>

const esc = s => String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
const escAttr = s => esc(s).replaceAll('"','&quot;');
const escJs = s => String(s).replaceAll('\\','\\\\').replaceAll("'", "\\'");
const clone = x => JSON.parse(JSON.stringify(x));
function load(){ try{const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):clone(defaults)}catch(e){return clone(defaults)} }
let state = load();
let editBlockName = null;
let editSectionName = null;
let editMessageIndex = null;
let inlineProposalIndex = null;
let ownerEditProposalIndex = null;
let assetEditIndex = null;
let dragState = null;

const roleSelect = document.getElementById('roleSelect');
const exportBtn = document.getElementById('exportBtn');
const downloadProjectBtn = document.getElementById('downloadProjectBtn');
const saveProjectBtn = document.getElementById('saveProjectBtn');
const syncIssuesBtn = document.getElementById('syncIssuesBtn');
const logoutBtn = document.getElementById('logoutBtn');

const isOwner = ()=> state.role === 'owner';
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

// ==================== РАБОТА С GITHUB ====================
function saveGitHubToken(token) { githubToken = token; localStorage.setItem('github_token', token); }

async function requestGitHubToken() {
  return new Promise(resolve => {
    const backdrop = document.getElementById('appModalBackdrop');
    document.getElementById('appModalTitle').textContent = 'Настройка GitHub';
    document.getElementById('appModalText').textContent = 'Введите Personal Access Token (права: repo)';
    document.getElementById('appModalFields').innerHTML = `
      <input id="githubTokenInput" class="app-modal-input" type="password" placeholder="GitHub Personal Access Token">
      <div class="toolbar" style="margin-top: 8px;"><button id="githubTokenHelpBtn" class="small-btn">Как получить токен?</button></div>
    `;
    const actions = document.getElementById('appModalActions');
    actions.innerHTML = '';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'small-btn';
    cancelBtn.textContent = 'Отмена';
    cancelBtn.onclick = () => { closeAppModal(); resolve(null); };
    const saveBtn = document.createElement('button');
    saveBtn.className = 'small-btn gold-btn';
    saveBtn.textContent = 'Сохранить';
    saveBtn.onclick = () => { const token = document.getElementById('githubTokenInput').value; closeAppModal(); resolve(token); };
    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    backdrop.classList.add('show');
    document.getElementById('githubTokenHelpBtn').onclick = () => { window.open('https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens', '_blank'); };
  });
}

async function getCurrentFileSha() {
  if (!githubToken) return null;
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/borzo_data.json`, {
      headers: { 'Authorization': `token ${githubToken}` }
    });
    if (response.ok) { const data = await response.json(); return data.sha; }
  } catch(e) {}
  return null;
}

async function saveToGitHub() {
  if (!githubToken) { const token = await requestGitHubToken(); if (!token) return false; saveGitHubToken(token); }
  const dataToSave = JSON.stringify(state, null, 2);
  const timestamp = new Date().toISOString();
  try {
    const sha = await getCurrentFileSha();
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/borzo_data.json`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Сохранить изменения от ${timestamp}`,
        content: btoa(unescape(encodeURIComponent(dataToSave))),
        sha: sha
      })
    });
    if (response.ok) { showAlertModal('Успешно', 'Изменения сохранены в GitHub'); return true; }
    else { const error = await response.json(); showAlertModal('Ошибка', `Не удалось сохранить: ${error.message || 'Неизвестная ошибка'}`); return false; }
  } catch(e) { showAlertModal('Ошибка', `Ошибка сохранения: ${e.message}`); return false; }
}

async function loadFromGitHub() {
  if (!githubToken) { const token = await requestGitHubToken(); if (!token) return false; saveGitHubToken(token); }
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/borzo_data.json`, {
      headers: { 'Authorization': `token ${githubToken}` }
    });
    if (response.ok) {
      const data = await response.json();
      const content = decodeURIComponent(escape(atob(data.content)));
      const loadedState = JSON.parse(content);
      state = loadedState;
      save();
      render();
      showAlertModal('Успешно', 'Данные загружены из GitHub');
      return true;
    } else { showAlertModal('Инфо', 'Файл borzo_data.json пока не создан. Сначала сохраните изменения.'); return false; }
  } catch(e) { console.error('Error loading from GitHub:', e); return false; }
}

async function createGitHubIssue(proposal) {
  if (!githubToken) return null;
  const title = `[Предложение] ${proposal.condition.substring(0, 50)}`;
  const body = `
## Тип: ${proposal.targetType === 'block' ? 'Изменение сообщения' : proposal.targetType === 'main-list' ? 'Новый блок' : proposal.targetType === 'section' ? 'Новый элемент' : 'Новый раздел'}

${proposal.targetType === 'block' ? `**Блок:** ${proposal.targetName}` : ''}
${proposal.targetType === 'main-list' ? `**Новый блок:** ${proposal.blockName || proposal.condition}` : ''}
${proposal.targetType === 'section' ? `**Раздел:** ${proposal.targetName}\n**Новый элемент:** ${proposal.blockName || proposal.condition}` : ''}
${proposal.targetType === 'new-section' ? `**Новый раздел:** ${proposal.sectionName}\n**Первый элемент:** ${proposal.blockName}` : ''}

**Назначение/условие:** ${proposal.condition}

**Текст сообщения:**
\`\`\`
${proposal.text}
\`\`\`

---
*Создано автоматически из BORZO Navigator*
  `;
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues`, {
      method: 'POST',
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, body: body, labels: [GITHUB_CONFIG.labels.pending] })
    });
    if (response.ok) { const issue = await response.json(); return issue; }
  } catch(e) { console.error('Error creating issue:', e); }
  return null;
}

async function updateGitHubIssueStatus(issueId, status) {
  if (!githubToken) return false;
  const label = status === 'approved' ? GITHUB_CONFIG.labels.approved : GITHUB_CONFIG.labels.rejected;
  try {
    const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ labels: [label] })
    });
    return response.ok;
  } catch(e) { return false; }
}

async function createProposalWithGitHub(targetType, targetName, data) {
  const proposal = { id: Date.now() + Math.random(), targetType, targetName, ...data, createdAt: new Date().toISOString(), status: 'pending' };
  state.proposals.unshift(proposal);
  if (githubToken) { const issue = await createGitHubIssue(proposal); if (issue) { proposal.githubIssueId = issue.number; showAlertModal('Предложение отправлено', `Создано в GitHub: #${issue.number}`); } }
  save(); render();
}

async function approveProposal(index, withEdit) {
  const p = state.proposals[index]; if(!p) return;
  if(p.targetType === 'block') {
    let label = p.condition, textValue = p.text;
    if(withEdit) { const res = await showTripleFieldModal('Скорректировать предложение','Назначение','Блок','Текст',label,p.targetName||'',textValue); if(!res) return; label = res.f1.trim() || label; textValue = res.f3.trim() || textValue; }
    if(!state.blocks[p.targetName]) state.blocks[p.targetName] = {kind:'side',note:'',hint:'',messages:[]};
    if(p.mode === 'replace' && Number.isInteger(p.sourceIndex) && state.blocks[p.targetName].messages[p.sourceIndex]) {
      const existing = state.blocks[p.targetName].messages[p.sourceIndex] || {};
      state.blocks[p.targetName].messages[p.sourceIndex] = {label,text:textValue,attachments: existing.attachments || []};
    } else { state.blocks[p.targetName].messages.push({label,text:textValue,attachments:[]}); }
  }
  if(p.targetType === 'main-list') {
    let blockName = p.blockName || p.condition, firstLabel = p.condition, firstText = p.text;
    if(withEdit) { const res = await showTripleFieldModal('Скорректировать блок','Название','Назначение','Текст',blockName,firstLabel,firstText); if(!res) return; blockName = res.f1.trim() || blockName; firstLabel = res.f2.trim() || firstLabel; firstText = res.f3.trim() || firstText; }
    if(blockName && !state.blocks[blockName]) { state.mainOrder.push(blockName); state.blocks[blockName] = {kind:'main',note:'',hint:'',messages:[{label:firstLabel,text:firstText}]}; }
  }
  if(p.targetType === 'section') {
    let blockName = p.blockName || p.condition, firstLabel = p.condition, firstText = p.text;
    if(withEdit) { const res = await showTripleFieldModal('Скорректировать элемент','Название','Назначение','Текст',blockName,firstLabel,firstText); if(!res) return; blockName = res.f1.trim() || blockName; firstLabel = res.f2.trim() || firstLabel; firstText = res.f3.trim() || firstText; }
    if(blockName) { if(!state.blocks[blockName]) state.blocks[blockName] = {kind:'side',note:'',hint:'',messages:[{label:firstLabel,text:firstText}]}; if(!state.sections[p.targetName]) state.sections[p.targetName] = []; if(!state.sections[p.targetName].includes(blockName)) state.sections[p.targetName].push(blockName); }
  }
  if(p.targetType === 'new-section') {
    let sectionName = p.sectionName || p.condition, blockName = p.blockName || '', firstLabel = p.condition || 'Основное сообщение', firstText = p.text;
    if(withEdit) { const res = await showQuadFieldModal('Скорректировать раздел','Название раздела','Название элемента','Назначение','Текст',sectionName,blockName,firstLabel,firstText); if(!res) return; sectionName = res.f1.trim() || sectionName; blockName = res.f2.trim() || blockName; firstLabel = res.f3.trim() || firstLabel; firstText = res.f4.trim() || firstText; }
    if(sectionName && !state.sections[sectionName]) { state.sectionOrder.push(sectionName); state.sections[sectionName] = []; if(blockName) { state.blocks[blockName] = {kind:'side',note:'',hint:'',messages:[{label:firstLabel,text:firstText}]}; state.sections[sectionName].push(blockName); } }
  }
  if(p.githubIssueId) await updateGitHubIssueStatus(p.githubIssueId, 'approved');
  state.proposals.splice(index,1);
  save(); render();
}

async function rejectProposal(index) {
  const p = state.proposals[index];
  const c = await showPromptModal('Комментарий по отклонению', 'Почему отклонено?', '');
  if(c === null) return;
  if(!Array.isArray(state.managerMessages)) state.managerMessages = [];
  state.managerMessages.push({ text: c.trim() || 'Запрос отклонён.' });
  if(p.githubIssueId) await updateGitHubIssueStatus(p.githubIssueId, 'rejected');
  state.proposals.splice(index,1);
  save(); render();
}

function logout() { localStorage.removeItem(AUTH_KEY); state.role = 'manager'; save(); render(); showLoginModal(); }
function showLoginModal() { const backdrop = document.getElementById('appModalBackdrop'); const modalTitle = document.getElementById('appModalTitle'); const modalText = document.getElementById('appModalText'); const modalFields = document.getElementById('appModalFields'); const modalActions = document.getElementById('appModalActions'); backdrop.className = 'app-modal-backdrop login-modal show'; modalTitle.textContent = 'Вход в систему'; modalText.textContent = 'Выберите роль и введите пароль'; modalFields.innerHTML = `<div class="role-buttons"><button id="loginRoleManager" class="role-btn active">Менеджер</button><button id="loginRoleOwner" class="role-btn">Руководитель</button></div><div id="loginPasswordField" class="password-field show"><input type="password" id="loginPassword" class="app-modal-input" placeholder="Введите пароль"></div><div style="margin-top: 12px;"><button id="githubSetupBtn" class="small-btn" style="width: 100%;">🔧 Настроить GitHub (для предложений)</button></div>`; modalActions.innerHTML = ''; const cancelBtn = document.createElement('button'); cancelBtn.className = 'small-btn'; cancelBtn.textContent = 'Отмена'; cancelBtn.onclick = () => { closeAppModal(); showLoginModal(); }; const loginBtn = document.createElement('button'); loginBtn.className = 'small-btn gold-btn'; loginBtn.textContent = 'Войти'; loginBtn.onclick = () => { const selectedRole = document.querySelector('.role-btn.active').textContent; const password = document.getElementById('loginPassword').value; if (selectedRole === 'Менеджер') { if (password === '4007') { state.role = 'manager'; saveAuth('manager'); closeAppModal(); save(); render(); } else { alert('Неверный пароль для менеджера'); } } else if (selectedRole === 'Руководитель') { if (password === '7004') { state.role = 'owner'; saveAuth('owner'); closeAppModal(); save(); render(); } else { alert('Неверный пароль для руководителя'); } } }; modalActions.appendChild(cancelBtn); modalActions.appendChild(loginBtn); backdrop.classList.add('show'); setTimeout(() => { const managerBtn = document.getElementById('loginRoleManager'); const ownerBtn = document.getElementById('loginRoleOwner'); const passwordField = document.getElementById('loginPasswordField'); const githubSetupBtn = document.getElementById('githubSetupBtn'); managerBtn.onclick = () => { managerBtn.classList.add('active'); ownerBtn.classList.remove('active'); passwordField.classList.add('show'); }; ownerBtn.onclick = () => { ownerBtn.classList.add('active'); managerBtn.classList.remove('active'); passwordField.classList.add('show'); }; githubSetupBtn.onclick = async () => { const token = await requestGitHubToken(); if (token) { saveGitHubToken(token); showAlertModal('Успешно', 'GitHub настроен. Теперь предложения будут создаваться в Issues'); } }; }, 0); }
async function initializeGitHub() { const savedToken = localStorage.getItem('github_token'); if (savedToken) { githubToken = savedToken; await loadFromGitHub(); } }

// ==================== ГЛАВНАЯ ФУНКЦИЯ РЕНДЕРА ====================
function render(){ roleSelect.value = state.role || 'manager'; const isOwnerMode = isOwner(); if (isOwnerMode) { downloadProjectBtn.style.display = 'inline-block'; exportBtn.style.display = 'inline-block'; saveProjectBtn.style.display = 'inline-block'; syncIssuesBtn.style.display = 'inline-block'; } else { downloadProjectBtn.style.display = 'none'; exportBtn.style.display = 'none'; saveProjectBtn.style.display = 'none'; syncIssuesBtn.style.display = 'none'; } renderMain(); renderRight(); renderCenter(); renderManagerReply(); renderProposals(); clearDragState(); save(); }

// ==================== ЗАПУСК ====================
window.addEventListener('load', async () => { if (!checkAuth()) { showLoginModal(); } else { await initializeGitHub(); render(); } });
logoutBtn.addEventListener('click', logout);
roleSelect.addEventListener('change', e => { const nextRole = e.target.value; if(nextRole === 'owner'){ const code = prompt('Введите код руководителя'); if(code !== '7004'){ alert('Неверный код'); state.role = 'manager'; roleSelect.value = 'manager'; saveAuth('manager'); save(); render(); return; } state.role = 'owner'; saveAuth('owner'); } else { state.role = 'manager'; saveAuth('manager'); } save(); render(); });
exportBtn.addEventListener('click', ()=>exportDatabase());
downloadProjectBtn.addEventListener('click', ()=>downloadProjectFile());
saveProjectBtn.addEventListener('click', async ()=>{ const confirmed = await showConfirmModal('Сохранить изменения', 'Все текущие изменения будут сохранены в GitHub. Продолжить?'); if(confirmed) await saveToGitHub(); });
syncIssuesBtn.addEventListener('click', async () => { if (!githubToken) { const token = await requestGitHubToken(); if (token) saveGitHubToken(token); else return; } await loadFromGitHub(); });
</script>

<div id="appModalBackdrop" class="app-modal-backdrop">
  <div class="app-modal">
    <div id="appModalTitle" class="app-modal-title"></div>
    <div id="appModalText" class="app-modal-text"></div>
    <div id="appModalFields"></div>
    <div class="app-modal-actions" id="appModalActions"></div>
  </div>
</div>

</body>
</html>
